    <>
      {latest && <div className="grid grid-cols-3 gap-2"><div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-3"><p className="text-[10px] font-mono text-zinc-500">CURRENT</p><p className="font-display text-3xl text-zinc-100">{latest.weight}<span className="text-sm text-zinc-500"> kg</span></p></div><div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-3"><p className="text-[10px] font-mono text-zinc-500">START</p><p className="font-display text-3xl text-zinc-100">{first.weight}<span className="text-sm text-zinc-500"> kg</span></p></div><div className={`bg-zinc-900 border rounded-2xl p-3 ${change > 0 ? 'border-green-500/30' : change < 0 ? 'border-rose-500/30' : 'border-zinc-800'}`}><p className="text-[10px] font-mono text-zinc-500">CHANGE</p><p className={`font-display text-3xl ${change > 0 ? 'text-green-400' : change < 0 ? 'text-rose-400' : 'text-zinc-100'}`}>{change > 0 ? '+' : ''}{change}<span className="text-sm text-zinc-500"> kg</span></p></div></div>}
      {weightData.length >= 2 && <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4"><p className="font-mono text-[10px] text-zinc-500 tracking-wider mb-3">WEIGHT TREND</p><ResponsiveContainer width="100%" height={200}><LineChart data={weightData}><CartesianGrid stroke="#27272a" strokeDasharray="3 3" /><XAxis dataKey="date" stroke="#71717a" fontSize={10} /><YAxis stroke="#71717a" fontSize={10} domain={['dataMin - 2', 'dataMax + 2']} /><Tooltip contentStyle={{ background: '#18181b', border: '1px solid #3f3f46', borderRadius: 8, fontSize: 12 }} /><Line type="monotone" dataKey="weight" stroke="#f59e0b" strokeWidth={2} dot={{ fill: '#f59e0b', r: 4 }} /></LineChart></ResponsiveContainer></div>}
      <button onClick={onAdd} className="w-full bg-amber-500 text-zinc-950 rounded-2xl py-4 font-display text-xl flex items-center justify-center gap-2 hover:bg-amber-400 transition"><Plus size={20} /> NEW CHECK-IN</button>
      {userCheckins.length === 0 ? <p className="text-zinc-500 text-sm text-center pt-4">No check-ins yet. Log your first to start tracking.</p> : (
        <div className="space-y-1.5"><p className="font-mono text-[10px] text-zinc-500 tracking-wider mt-4">HISTORY</p>
          {[...userCheckins].reverse().map(c => <div key={c.id} className="bg-zinc-900/60 border border-zinc-800/60 rounded-xl p-3 flex justify-between items-start"><div className="flex-1"><div className="flex items-center gap-3 text-sm text-zinc-200">{c.weight != null && <span>{c.weight} kg</span>}{c.bodyFat != null && <span className="text-zinc-400">{c.bodyFat}% BF</span>}</div>{(c.waist || c.arm || c.thigh || c.hip) && <div className="flex flex-wrap gap-2 mt-1 text-[10px] font-mono text-zinc-500">{c.waist && <span>W {c.waist}</span>}{c.arm && <span>A {c.arm}</span>}{c.thigh && <span>T {c.thigh}</span>}{c.hip && <span>H {c.hip}</span>}</div>}{c.note && <p className="text-xs text-zinc-500 mt-1">{c.note}</p>}</div><div className="flex items-center gap-2"><p className="text-[10px] font-mono text-zinc-500">{new Date(c.date).toLocaleDateString()}</p><button onClick={async () => { if (safeConfirm('Delete this check-in?')) await saveCheckins(checkins.filter(x => x.id !== c.id)); }} className="text-zinc-600 hover:text-red-500"><Trash2 size={12} /></button></div></div>)}
        </div>
      )}
    </>
  );
}

function MeasurementsView({ userCheckins, onAdd }) {
  const measures = [{ key: 'bodyFat', label: 'BODY FAT', unit: '%', color: '#ec4899' }, { key: 'waist', label: 'WAIST', unit: 'cm', color: '#f59e0b' }, { key: 'arm', label: 'ARM', unit: 'cm', color: '#10b981' }, { key: 'thigh', label: 'THIGH', unit: 'cm', color: '#a855f7' }, { key: 'hip', label: 'HIP', unit: 'cm', color: '#3b82f6' }];
  const summary = measures.map(m => { const entries = userCheckins.filter(c => c[m.key] != null); const latest = [...entries].reverse()[0]; const first = entries[0]; const change = latest && first && entries.length > 1 ? (latest[m.key] - first[m.key]).toFixed(1) : null; return { ...m, latest: latest?.[m.key], change, count: entries.length }; });
  const anyData = summary.some(s => s.latest != null);
  return (
    <>
      {anyData ? <div className="grid grid-cols-2 gap-2">{summary.filter(s => s.latest != null).map(s => <div key={s.key} className="bg-zinc-900 border border-zinc-800 rounded-2xl p-3"><div className="flex items-center gap-1.5"><div className="w-1.5 h-1.5 rounded-full" style={{ background: s.color }} /><p className="text-[10px] font-mono text-zinc-500 tracking-wider">{s.label}</p></div><p className="font-display text-2xl text-zinc-100 mt-1">{s.latest}<span className="text-sm text-zinc-500"> {s.unit}</span></p>{s.change != null && <p className={`text-[10px] font-mono mt-0.5 ${s.change > 0 ? 'text-green-400' : s.change < 0 ? 'text-rose-400' : 'text-zinc-500'}`}>{s.change > 0 ? '+' : ''}{s.change} {s.unit}</p>}</div>)}</div> : <div className="border border-dashed border-zinc-800 rounded-2xl p-8 text-center"><Target className="mx-auto mb-2 text-zinc-700" size={28} /><p className="text-zinc-500 text-sm">Add a check-in with measurements to see your stats.</p></div>}
      <button onClick={onAdd} className="w-full bg-amber-500 text-zinc-950 rounded-2xl py-4 font-display text-xl flex items-center justify-center gap-2 hover:bg-amber-400 transition"><Plus size={20} /> NEW CHECK-IN</button>
      {summary.filter(s => s.count >= 2).map(s => { const data = userCheckins.filter(c => c[s.key] != null).map(c => ({ date: new Date(c.date).toLocaleDateString('en', { month: 'short', day: 'numeric' }), value: c[s.key] })); return <div key={s.key} className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4"><div className="flex items-center gap-2 mb-3"><div className="w-1.5 h-1.5 rounded-full" style={{ background: s.color }} /><p className="font-mono text-[10px] text-zinc-500 tracking-wider">{s.label} TREND ({s.unit})</p></div><ResponsiveContainer width="100%" height={140}><LineChart data={data}><CartesianGrid stroke="#27272a" strokeDasharray="3 3" /><XAxis dataKey="date" stroke="#71717a" fontSize={9} /><YAxis stroke="#71717a" fontSize={9} domain={['dataMin - 1', 'dataMax + 1']} /><Tooltip contentStyle={{ background: '#18181b', border: '1px solid #3f3f46', borderRadius: 8, fontSize: 12 }} /><Line type="monotone" dataKey="value" stroke={s.color} strokeWidth={2} dot={{ fill: s.color, r: 3 }} /></LineChart></ResponsiveContainer></div>; })}
      {anyData && summary.every(s => s.count < 2) && <p className="text-zinc-500 text-xs text-center">Log a second check-in to see trends.</p>}
    </>
  );
}

function PhotosView({ user, photos, allPhotos, savePhotos }) {
  const fileRef = useRef(null);
  const [selectedPhoto, setSelectedPhoto] = useState(null);
  const [err, setErr] = useState(null);
  const handleUpload = async (e) => {
    const files = Array.from(e.target.files || []);
    setErr(null);
    // Guard against the storage size limit by compressing/limiting images.
    const newPhotos = [];
    for (const file of files) {
      if (file.size > 8 * 1024 * 1024) { setErr('One photo was over 8MB and was skipped. Try a smaller image.'); continue; }
      const dataUrl = await new Promise((resolve) => { const reader = new FileReader(); reader.onloadend = () => resolve(reader.result); reader.readAsDataURL(file); });
      newPhotos.push({ id: Date.now().toString() + Math.random(), user, date: new Date().toISOString(), data: dataUrl });
    }
    if (newPhotos.length) await savePhotos([...allPhotos, ...newPhotos]);
    if (fileRef.current) fileRef.current.value = '';
  };
  const deletePhoto = async (id) => { if (!safeConfirm('Delete this photo?')) return; await savePhotos(allPhotos.filter(p => p.id !== id)); setSelectedPhoto(null); };
  return (
    <div className="space-y-3">
      <button onClick={() => fileRef.current?.click()} className="w-full bg-amber-500 text-zinc-950 rounded-2xl py-4 font-display text-xl flex items-center justify-center gap-2 hover:bg-amber-400 transition"><Camera size={20} /> ADD PHOTO</button>
      <input ref={fileRef} type="file" accept="image/*" multiple onChange={handleUpload} className="hidden" />
      <p className="text-[10px] font-mono text-zinc-500">Photos are stored privately in this app on this device.</p>
      {err && <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-3 text-xs text-red-300">{err}</div>}
      {photos.length === 0 ? <div className="border border-dashed border-zinc-800 rounded-2xl p-12 text-center"><ImageIcon className="mx-auto mb-3 text-zinc-700" size={32} /><p className="text-zinc-500 text-sm">No check-in photos yet.</p></div> : (
        <div className="grid grid-cols-3 gap-1.5">
          {photos.map(p => <button key={p.id} onClick={() => setSelectedPhoto(p)} className="relative aspect-[3/4] rounded-lg overflow-hidden bg-zinc-900 group"><img src={p.data} alt="" className="w-full h-full object-cover" /><div className="absolute inset-0 bg-gradient-to-t from-zinc-950/80 to-transparent opacity-0 group-hover:opacity-100 transition flex items-end p-2"><p className="text-[9px] font-mono text-white">{new Date(p.date).toLocaleDateString()}</p></div></button>)}
        </div>
      )}
      {selectedPhoto && <div className="fixed inset-0 z-50 bg-zinc-950/95 backdrop-blur flex flex-col" onClick={() => setSelectedPhoto(null)}><div className="flex justify-between items-center p-4"><p className="font-mono text-xs text-zinc-400">{new Date(selectedPhoto.date).toLocaleString()}</p><div className="flex gap-2"><button onClick={(e) => { e.stopPropagation(); deletePhoto(selectedPhoto.id); }} className="p-2 text-zinc-400 hover:text-red-500"><Trash2 size={18} /></button><button onClick={() => setSelectedPhoto(null)} className="p-2 text-zinc-400"><X size={20} /></button></div></div><div className="flex-1 flex items-center justify-center p-4" onClick={e => e.stopPropagation()}><img src={selectedPhoto.data} alt="" className="max-w-full max-h-full object-contain rounded-lg" /></div></div>}
    </div>
  );
}

        <div className="flex items-center justify-between sticky top-0 bg-zinc-900 -mx-6 px-6 pb-2"><div><p className="font-mono text-[10px] text-zinc-500 tracking-[0.3em]">// CHECK-IN</p><h2 className="font-display text-3xl text-zinc-100">NEW ENTRY</h2></div><button onClick={onClose} className="text-zinc-500"><X size={20} /></button></div>

        <div><label className="text-[10px] font-mono text-zinc-500 tracking-wider">NOTE (OPTIONAL)</label><textarea value={note} onChange={e => setNote(e.target.value)} placeholder="How are you feeling?" rows={2} className="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2 mt-1 text-sm text-zinc-100 placeholder-zinc-600 focus:border-amber-500 outline-none resize-none" /></div>

function AICoachPanel({ user, sessionExercises, context, logs, onApplyAdjustment, onClose }) {
  const [loading, setLoading] = useState(false);
  const [response, setResponse] = useState(null);
  const [error, setError] = useState(null);
  const [rir, setRir] = useState('');
  const [feel, setFeel] = useState(null);
  const [customKey, setCustomKey] = useState('');
  const [showSettings, setShowSettings] = useState(false);
  const [suggestion, setSuggestion] = useState(null);
  useEffect(() => { (async () => { const k = await storage.get('coachApiKey'); if (k) setCustomKey(k); })(); }, []);
  const ctxExercise = context ? sessionExercises[context.exIdx] : null;
  const ctxSet = context ? ctxExercise?.sets[context.setIdx] : null;
  const buildSessionSummary = () => sessionExercises.map(ex => { const done = ex.sets.filter(s => s.done && s.weight && s.reps); if (done.length === 0) return null; return `${ex.name} (${ex.muscle}): ${done.map(s => `${s.weight}kg×${s.reps}${s.rir != null && s.rir !== '' ? ` @${s.rir}RIR` : ''}`).join(', ')}`; }).filter(Boolean).join('\n');
  const runCoach = async (mode) => {
    setLoading(true); setError(null); setResponse(null); setSuggestion(null);
    const system = `You are an expert strength & hypertrophy coach giving LIVE, in-gym feedback during a workout. Be concise and punchy — this is read on a phone mid-set. Use plain language, no fluff, no preamble. Max ~70 words unless analysing multiple issues.\n\nKey coaching principles:\n- For hypertrophy: most working sets should be taken to 0-3 reps in reserve (RIR). 1-2 RIR is the sweet spot.\n- If reps are very high (>15-20) with low RIR, weight is likely too light for strength/hypertrophy goals — suggest going heavier.\n- If reps are very low (<5) when the goal is hypertrophy, or RIR is 4+, suggest adjusting.\n- Rep ranges: strength 3-6, hypertrophy 6-12, endurance 15+.\n- Progressive overload matters: compare to previous sets if provided.\n- Be encouraging but honest. Flag suboptimal load/rep choices clearly.\n\nWhen you recommend a specific weight or rep change, end your response with a line in EXACTLY this format (no other text on that line):\nSUGGEST: weight=<number> reps=<number>\nOnly include SUGGEST if you have a concrete numeric recommendation for the current set.`;
    let userPrompt = '';
    const sessionSummary = buildSessionSummary();
    if (mode === 'set-analysis' && ctxExercise && ctxSet) {
      const prevLog = [...logs].reverse().find(l => l.user === user && l.exercises.find(e => e.name === ctxExercise.name));
      const prevSets = prevLog?.exercises.find(e => e.name === ctxExercise.name)?.sets || [];
      userPrompt = `I just completed a set of ${ctxExercise.name} (${ctxExercise.muscle}):\nWeight: ${ctxSet.weight}kg, Reps: ${ctxSet.reps}${ctxSet.rir != null && ctxSet.rir !== '' ? `, RIR: ${ctxSet.rir}` : ', RIR: not recorded'}.\n${feel ? `It felt: ${feel}.` : ''}\n${prevSets.length ? `Last session on this exercise: ${prevSets.map(s => `${s.weight}kg×${s.reps}`).join(', ')}.` : 'No previous data for this exercise.'}\n\nMy goal is general hypertrophy/muscle building. Is this weight and rep range optimal? Should I adjust for the next set? Give quick live feedback.`;
    } else if (mode === 'rir-check' && ctxExercise && ctxSet) {
      userPrompt = `I just did ${ctxExercise.name}: ${ctxSet.weight}kg × ${ctxSet.reps} reps, and I had ${rir} reps left in the tank (RIR ${rir}).${feel ? ` It felt: ${feel}.` : ''}\nMy goal is hypertrophy. Based on this RIR, should I change the weight or reps for my next set? Quick advice.`;
    } else {
      userPrompt = `Here's how my workout is going so far:\n${sessionSummary || 'No sets completed yet.'}\n\nMy goal is general hypertrophy/muscle building. Give me a quick overall read — am I training effectively? Anything to adjust? Keep it short.`;
    }
    try {
      const text = await askCoach(system, userPrompt, customKey || null);
      const match = text.match(/SUGGEST:\s*weight=([\d.]+)\s*reps=(\d+)/i);
      setResponse(text.replace(/SUGGEST:.*/i, '').trim());
      if (match && context) setSuggestion({ exIdx: context.exIdx, setIdx: context.setIdx, weight: parseFloat(match[1]), reps: parseInt(match[2]) });
    } catch (e) {
      if (ctxExercise && ctxSet) {
        const local = localCoachAdvice({ exerciseName: ctxExercise.name, weight: ctxSet.weight, reps: ctxSet.reps, rir: rir !== '' ? rir : ctxSet.rir, feel, autoFlag: context?.autoFlag });
        setResponse(local.msg + '\n\n(Offline coach — connect a custom API key in settings for full AI feedback.)');
        if (local.suggestion && context) setSuggestion({ exIdx: context.exIdx, setIdx: context.setIdx, weight: local.suggestion.weight, reps: local.suggestion.reps });
      } else {
        setResponse((buildSessionSummary() ? 'Quick read on your session so far:\n\n' + buildSessionSummary() + '\n\nKeep your working sets in the 6–15 rep range at 1–2 RIR and aim to beat last session on at least one lift.' : 'No completed sets yet — log a few and I\'ll give you a read.') + '\n\n(Offline coach — connect a custom API key in settings for full AI feedback.)');
      }
    } finally { setLoading(false); }
  };
  const saveKey = async () => { await storage.set('coachApiKey', customKey); setShowSettings(false); };
  const applySuggestion = () => {
    if (!suggestion) return;
    const ex = sessionExercises[suggestion.exIdx];
    const nextSetIdx = suggestion.setIdx + 1 < ex.sets.length ? suggestion.setIdx + 1 : suggestion.setIdx;
    onApplyAdjustment(suggestion.exIdx, nextSetIdx, { weight: suggestion.weight, reps: suggestion.reps });
    setSuggestion(null); setResponse(r => (r || '') + '\n\n✓ Applied to your next set.');
  };
  return (
    <div className="fixed inset-0 z-[58] bg-zinc-950/80 backdrop-blur flex items-end sm:items-center justify-center p-3" onClick={onClose}>
      <div className="bg-gradient-to-b from-zinc-900 to-zinc-950 border border-amber-500/30 rounded-3xl w-full max-w-md p-5 space-y-4 max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2"><div className="w-9 h-9 rounded-full bg-gradient-to-br from-amber-400 to-red-600 flex items-center justify-center"><Flame size={18} className="text-zinc-950" /></div><div><p className="font-mono text-[10px] text-amber-500 tracking-[0.3em]">// AI COACH</p><p className="font-display text-2xl text-zinc-100 leading-none">LIVE FEEDBACK</p></div></div>
          <div className="flex gap-1"><button onClick={() => setShowSettings(s => !s)} className="text-zinc-500 hover:text-zinc-300 p-1"><Edit2 size={16} /></button><button onClick={onClose} className="text-zinc-500 p-1"><X size={20} /></button></div>
        </div>
        {showSettings && <div className="bg-zinc-800/50 border border-zinc-700 rounded-xl p-3 space-y-2"><p className="text-[10px] font-mono text-zinc-400 tracking-wider">CUSTOM API KEY (OPTIONAL)</p><p className="text-[11px] text-zinc-500">Leave blank to use the built-in Claude AI.</p><input type="password" value={customKey} onChange={e => setCustomKey(e.target.value)} placeholder="sk-ant-..." className="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-zinc-100 placeholder-zinc-600 focus:border-amber-500 outline-none font-mono" /><button onClick={saveKey} className="w-full bg-amber-500/20 border border-amber-500/40 text-amber-400 rounded-lg py-2 text-xs font-mono">SAVE KEY</button></div>}
        {context?.autoFlag && <div className="bg-amber-500/10 border border-amber-500/40 rounded-xl p-3 flex items-start gap-2"><Flame size={14} className="text-amber-400 mt-0.5 shrink-0" /><p className="text-amber-200 text-xs leading-relaxed">{AUTO_FLAG_MESSAGES[context.autoFlag] || 'That set looked a little off — want a quick check?'}</p></div>}
        {ctxExercise && ctxSet && <div className="bg-zinc-800/40 border border-zinc-700/50 rounded-xl p-3"><p className="text-[10px] font-mono text-zinc-500 tracking-wider mb-1">JUST LOGGED</p><p className="text-zinc-100 text-sm">{ctxExercise.name}</p><p className="font-display text-2xl text-amber-500">{ctxSet.weight}kg × {ctxSet.reps}{ctxSet.rir != null && ctxSet.rir !== '' ? ` · ${ctxSet.rir} RIR` : ''}</p></div>}
        {ctxExercise && ctxSet && !response && !loading && (
          <div className="space-y-3">
            <div><p className="text-[11px] font-mono text-zinc-400 tracking-wider mb-2">HOW MANY REPS LEFT IN THE TANK? (RIR)</p><div className="flex gap-1.5">{['0','1','2','3','4+'].map(v => <button key={v} onClick={() => setRir(v.replace('+',''))} className={`flex-1 py-2.5 rounded-xl font-display text-lg transition ${rir === v.replace('+','') ? 'bg-amber-500 text-zinc-950' : 'bg-zinc-800 border border-zinc-700 text-zinc-300 hover:border-amber-500/50'}`}>{v}</button>)}</div></div>
            <div><p className="text-[11px] font-mono text-zinc-400 tracking-wider mb-2">HOW DID IT FEEL?</p><div className="flex gap-1.5">{['Too easy','Just right','Brutal'].map(f => <button key={f} onClick={() => setFeel(f)} className={`flex-1 py-2 rounded-xl text-xs transition ${feel === f ? 'bg-amber-500 text-zinc-950' : 'bg-zinc-800 border border-zinc-700 text-zinc-300 hover:border-amber-500/50'}`}>{f}</button>)}</div></div>
            <button onClick={() => runCoach(rir !== '' ? 'rir-check' : 'set-analysis')} className="w-full bg-amber-500 text-zinc-950 rounded-xl py-3 font-display text-lg hover:bg-amber-400 transition flex items-center justify-center gap-2"><Flame size={16} /> GET FEEDBACK</button>
          </div>
        )}
        {!ctxExercise && !response && !loading && <button onClick={() => runCoach('session-check')} className="w-full bg-amber-500 text-zinc-950 rounded-xl py-3 font-display text-lg hover:bg-amber-400 transition flex items-center justify-center gap-2"><Flame size={16} /> ANALYSE MY SESSION</button>}
        {loading && <div className="py-8 text-center"><div className="inline-block w-8 h-8 border-2 border-amber-500 border-t-transparent rounded-full animate-spin"></div><p className="text-zinc-500 text-xs font-mono mt-3 tracking-wider">COACH IS THINKING...</p></div>}
        {error && <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-3"><p className="text-red-300 text-sm">{error}</p></div>}
        {response && <div className="space-y-3"><div className="bg-zinc-800/50 border border-amber-500/20 rounded-xl p-4"><p className="text-zinc-100 text-sm leading-relaxed whitespace-pre-line">{response}</p></div>{suggestion && <button onClick={applySuggestion} className="w-full bg-amber-500 text-zinc-950 rounded-xl py-3 font-display text-base hover:bg-amber-400 transition flex items-center justify-center gap-2"><Check size={16} /> APPLY: {suggestion.weight}KG × {suggestion.reps}</button>}<button onClick={() => { setResponse(null); setRir(''); setFeel(null); setSuggestion(null); }} className="w-full border border-zinc-700 text-zinc-400 rounded-xl py-2.5 text-sm font-mono">ASK AGAIN</button></div>}
        <p className="text-[10px] text-zinc-600 text-center">AI coaching is guidance, not a substitute for a qualified trainer. Listen to your body.</p>
      </div>
    </div>
  );
}

function BottomNav({ tab, setTab }) {
  const tabs = [{ id: 'home', label: 'Home', icon: User }, { id: 'days', label: 'Days', icon: Calendar }, { id: 'progress', label: 'Progress', icon: TrendingUp }, { id: 'checkins', label: 'Check-In', icon: Camera }];
  return (
    <nav className="fixed bottom-0 left-0 right-0 z-40 bg-zinc-950/95 backdrop-blur-md border-t border-zinc-800">
      <div className="max-w-3xl mx-auto px-2 py-2 grid grid-cols-4">
        {tabs.map(({ id, label, icon: Icon }) => (
          <button key={id} onClick={() => setTab(id)} className={`flex flex-col items-center gap-1 py-2 rounded-xl transition ${tab === id ? 'text-amber-500' : 'text-zinc-500'}`}>
            <Icon size={20} strokeWidth={tab === id ? 2.5 : 2} />
            <span className={`text-[10px] font-mono tracking-wider ${tab === id ? 'font-bold' : ''}`}>{label.toUpperCase()}</span>
          </button>
        ))}
      </div>
    </nav>
  );
}


const rootEl = document.getElementById('root');
function startApp() {
  try {
    ReactDOM.createRoot(rootEl).render(React.createElement(WorkoutApp));
  } catch (err) {
    rootEl.innerHTML = '<div style="color:#fca5a5;font-family:monospace;padding:24px;font-size:13px;white-space:pre-wrap">App failed to start:\n\n' + (err && err.message ? err.message : String(err)) + '</div>';
  }
}
// Wait briefly for the Recharts CDN script if it hasn't arrived yet, so the
// charts render properly. Give up after ~3s and start anyway (charts will be
// blank but the rest of the app works fine).
(function waitForLibs(attempt) {
  if (typeof Recharts !== 'undefined' || attempt > 30) { startApp(); return; }
  setTimeout(function () { waitForLibs(attempt + 1); }, 100);
})(0);
</script>
</body>
</html>
