// ─── PERSISTENCE ─────────────────────────────────────────────────────────────
// Primary store is localStorage so data survives on a hosted/bookmarked page.
// When running inside the Claude artifact sandbox, window.storage (shared) is
// used instead so both users can see the same shared data.
const hasWindowStorage = typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function';

const storage = {
  async get(key) {
    try {
      if (hasWindowStorage) { const r = await window.storage.get(key, true); return r ? JSON.parse(r.value) : null; }
      const raw = localStorage.getItem('ironlog:' + key);
      return raw != null ? JSON.parse(raw) : null;
    } catch { return null; }
  },
  async set(key, value) {
    try {
      if (hasWindowStorage) await window.storage.set(key, JSON.stringify(value), true);
      else localStorage.setItem('ironlog:' + key, JSON.stringify(value));
      try { window.dispatchEvent(new CustomEvent('ironlog-saved')); } catch {}
      return true;
    } catch (e) {
      console.error(e);
      try { window.dispatchEvent(new CustomEvent('ironlog-save-failed')); } catch {}
      return false;
    }
  },
  async delete(key) {
    try { if (hasWindowStorage) await window.storage.delete(key, true); else localStorage.removeItem('ironlog:' + key); } catch {}
  },
};

function safeConfirm(message) {
  try { return window.confirm(message); } catch { return true; }
}

async function exportAllData() {
  const keys = ['days', 'logs', 'checkins', 'photos', 'goals'];
  const bundle = { app: 'ironlog', version: 1, exportedAt: new Date().toISOString(), data: {} };
  for (const k of keys) bundle.data[k] = await storage.get(k);
  const blob = new Blob([JSON.stringify(bundle, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `ironlog-backup-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  return bundle;
}

function parseImportedData(text) {
  const parsed = JSON.parse(text);
  const data = parsed.data && parsed.app === 'ironlog' ? parsed.data : parsed;
  const clean = {};
  ['days', 'logs', 'checkins', 'photos', 'goals'].forEach(k => { if (data[k] != null) clean[k] = data[k]; });
  return clean;
}

async function askCoach(systemPrompt, userPrompt, customKey) {
  const body = { model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: systemPrompt, messages: [{ role: 'user', content: userPrompt }] };
  const headers = { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' };
  if (customKey) headers['x-api-key'] = customKey;
  const res = await fetch('https://api.anthropic.com/v1/messages', { method: 'POST', headers, body: JSON.stringify(body) });
  if (!res.ok) throw new Error('Coach request failed: ' + res.status);
  const data = await res.json();
  return data.content.map(i => (i.type === 'text' ? i.text : '')).filter(Boolean).join('\n');
}

function localCoachAdvice({ exerciseName, weight, reps, rir, feel, autoFlag }) {
  const w = parseFloat(weight); const r = parseInt(reps);
  const rr = rir === '' || rir == null ? null : parseInt(rir);
  let msg = ''; let suggestion = null;
  const bump = (pct) => w ? Math.round((w * (1 + pct)) * 2) / 2 : null;
  const cut = (pct) => w ? Math.round((w * (1 - pct)) * 2) / 2 : null;
  if (autoFlag === 'too-light' || (rr != null && rr >= 4)) {
    msg = `You left ${rr ?? '4+'} reps in the tank — that's below your working intensity for growth. Add weight next set to land in the 1–2 RIR zone.`;
    if (w) suggestion = { weight: bump(0.07), reps: r || 10 };
  } else if (autoFlag === 'high-reps-to-failure' || (rr != null && rr <= 1 && r >= 20)) {
    msg = `${r} reps to near-failure is more endurance than hypertrophy. Go heavier so you fail around 8–12 reps.`;
    if (w) suggestion = { weight: bump(0.12), reps: 10 };
  } else if (autoFlag === 'grinding-heavy' || (rr === 0 && r <= 3)) {
    msg = `Grinding ${r} reps at true failure is taxing on the joints and CNS. For size, drop the load and aim for 6–10 clean reps.`;
    if (w) suggestion = { weight: cut(0.1), reps: 8 };
  } else if (autoFlag === 'very-high-reps' || r >= 25) {
    msg = `${r} reps is very high — likely too light for hypertrophy. Bump the weight to bring reps into the 8–15 range.`;
    if (w) suggestion = { weight: bump(0.15), reps: 12 };
  } else if (autoFlag === 'very-low-reps' || r <= 2) {
    msg = `${r} reps is strength/power territory. Fine if that's the goal — for muscle growth aim for 6–12.`;
  } else {
    msg = `${w ? w + 'kg × ' : ''}${r} reps${rr != null ? ` at ${rr} RIR` : ''} looks solid. Keep the load here and chase one more rep or a touch more weight next session.`;
  }
  if (feel === 'Too easy' && (rr == null || rr >= 2)) msg += ` Since it felt too easy, don't be shy adding load.`;
  else if (feel === 'Brutal' && rr != null && rr >= 3) msg += ` Worth noting: it felt brutal but you logged ${rr} RIR — if it was actually closer to failure, your RIR may be underestimated.`;
  return { msg, suggestion };
}

const calc1RM = (weight, reps) => weight * (1 + reps / 30);

// ─── PROGRESSION ENGINE ──────────────────────────────────────────────────────
const REP_RANGES = {
  'Conventional Deadlift': [3, 6], 'Sumo Deadlift': [3, 6], 'Back Squat': [3, 6], 'Front Squat': [4, 6],
  'Overhead Press': [4, 8], 'Push Press': [3, 6], 'Power Clean': [3, 5], 'Clean': [3, 5], 'Snatch': [2, 4], 'Push Jerk': [2, 5],
  default: [6, 12],
};
const getRepRange = (n) => REP_RANGES[n] || REP_RANGES.default;

function roundLoad(weight, equipment) {
  if (equipment === 'Dumbbell' || equipment === 'Kettlebell') return Math.round(weight / 2) * 2;
  if (equipment === 'Cable' || equipment === 'Plate Loaded') return Math.round(weight / 2.5) * 2.5;
  return Math.round(weight / 1.25) * 1.25;
}

// Returns a suggestion for the next time this exercise is performed, based on
// the most recent prior session. null when there's no history yet.
function getProgressionTarget(exerciseName, equipment, user, logs) {
  const prev = logs
    .filter(l => l.user === user && l.exercises.some(e => e.name === exerciseName))
    .sort((a, b) => new Date(a.date) - new Date(b.date));
  if (prev.length === 0) return null;
  const last = prev[prev.length - 1];
  const ex = last.exercises.find(e => e.name === exerciseName);
  if (!ex || ex.sets.length === 0) return null;
  const top = [...ex.sets].sort((a, b) => b.weight !== a.weight ? b.weight - a.weight : b.reps - a.reps)[0];
  const [lo, hi] = getRepRange(exerciseName);
  const w = top.weight, r = top.reps, rir = top.rir != null ? parseInt(top.rir) : null;
  let nextW = w, repsMin = lo, repsMax = hi, note = '';
  const hitTop = r >= hi, lowRIR = rir != null && rir <= 2, noRIR = rir == null, highRIR = rir != null && rir >= 3;
  const below = r < lo, inRange = r >= lo && r <= hi;
  if (hitTop && (lowRIR || noRIR)) {
    nextW = roundLoad(w + (w >= 20 ? 2.5 : 1.25), equipment);
    if (nextW <= w) nextW = w + (w >= 20 ? 2.5 : 1.25);
    repsMin = lo; repsMax = hi; note = `Hit ${r} reps last time — step up the weight`;
  } else if (inRange && highRIR) {
    nextW = w; repsMin = r + 1; repsMax = Math.min(r + 2, hi + 2); note = `${rir} RIR spare — add reps before weight`;
  } else if (inRange) {
    nextW = w; repsMin = r; repsMax = hi; note = r < hi ? `Push toward ${hi} reps at this weight` : `Match & beat — then add load`;
  } else if (below) {
    nextW = w; repsMin = r + 1; repsMax = hi; note = `Build into the ${lo}–${hi} range first`;
  } else { nextW = w; repsMin = lo; repsMax = hi; note = `Beat last session`; }
  return { weight: nextW, repsMin, repsMax, note, prevWeight: w, prevReps: r, prevRIR: rir, date: last.date };
}

const AUTO_FLAG_MESSAGES = {
  'too-light': 'You left a lot in the tank (4+ RIR). That set may be too light to drive growth.',
  'high-reps-to-failure': 'High reps taken close to failure — this is more endurance than muscle-building. Worth a look.',
  'grinding-heavy': 'Grinding very heavy near failure — let\'s check that\'s what you intended.',
  'very-high-reps': 'That was a very high rep count — the weight might be too light.',
  'very-low-reps': 'Very low reps — strength territory. Quick check if your goal is size.',
};

function detectSetIssue(reps, rir) {
  if (isNaN(reps)) return null;
  if (rir == null) { if (reps >= 25) return 'very-high-reps'; if (reps <= 2) return 'very-low-reps'; return null; }
  if (rir >= 4) return 'too-light';
  if (rir <= 1 && reps >= 20) return 'high-reps-to-failure';
  if (rir === 0 && reps <= 3) return 'grinding-heavy';
  return null;
}

const detectPRs = (newLog, previousLogs) => {
  const prs = [];
  const userPrevLogs = previousLogs.filter(l => l.user === newLog.user);
  newLog.exercises.forEach(ex => {
    const allPrevSets = userPrevLogs.flatMap(l => l.exercises.filter(e => e.name === ex.name)).flatMap(e => e.sets);
    if (allPrevSets.length === 0) return;
    const newMaxWeight = Math.max(...ex.sets.map(s => s.weight));
    const prevMaxWeight = Math.max(...allPrevSets.map(s => s.weight));
    const newMax1RM = Math.max(...ex.sets.map(s => calc1RM(s.weight, s.reps)));
    const prevMax1RM = Math.max(...allPrevSets.map(s => calc1RM(s.weight, s.reps)));
    const newVolume = ex.sets.reduce((s, set) => s + set.weight * set.reps, 0);
    const prevSessionVolumes = userPrevLogs.map(l => { const e = l.exercises.find(x => x.name === ex.name); return e ? e.sets.reduce((s, set) => s + set.weight * set.reps, 0) : 0; }).filter(v => v > 0);
    const prevMaxVolume = prevSessionVolumes.length ? Math.max(...prevSessionVolumes) : 0;
    if (newMaxWeight > prevMaxWeight) prs.push({ type: 'pr-weight', title: 'NEW WEIGHT PR', exercise: ex.name, value: `${newMaxWeight} kg`, previous: `${prevMaxWeight} kg` });
    if (newMax1RM > prevMax1RM + 0.5) prs.push({ type: 'pr-1rm', title: 'NEW EST. 1RM', exercise: ex.name, value: `${Math.round(newMax1RM)} kg`, previous: `${Math.round(prevMax1RM)} kg` });
    if (newVolume > prevMaxVolume && prevMaxVolume > 0) prs.push({ type: 'pr-volume', title: 'BEST SESSION VOLUME', exercise: ex.name, value: `${Math.round(newVolume)} kg`, previous: `${Math.round(prevMaxVolume)} kg` });
  });
  const seen = new Set();
  const order = ['pr-weight', 'pr-1rm', 'pr-volume'];
  return prs.sort((a, b) => order.indexOf(a.type) - order.indexOf(b.type)).filter(pr => { if (seen.has(pr.exercise)) return false; seen.add(pr.exercise); return true; });
};

const getWeekKey = (date) => {
  const d = new Date(date); const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1); return d.toISOString().slice(0, 10);
};

const countWorkoutsThisWeek = (logs, user) => {
  const thisWeek = getWeekKey(new Date());
  return logs.filter(l => l.user === user && getWeekKey(l.date) === thisWeek).length;
};

const detectMilestones = (newLog, prevLogs, goals) => {
  const milestones = [];
  const allLogs = [...prevLogs, newLog];
  const userLogs = allLogs.filter(l => l.user === newLog.user);
  const total = userLogs.length;
  const countMilestones = [1, 5, 10, 25, 50, 100, 200, 500];
  if (countMilestones.includes(total)) milestones.push({ type: 'count', title: `${total} WORKOUTS LOGGED`, subtitle: total === 1 ? 'The journey begins.' : 'Consistency is everything.' });
  const weeklyTarget = goals[newLog.user]?.weeklyTarget;
  if (weeklyTarget) {
    const thisWeekCount = countWorkoutsThisWeek(allLogs, newLog.user);
    const lastWeekCount = countWorkoutsThisWeek(prevLogs, newLog.user);
    if (thisWeekCount === weeklyTarget && lastWeekCount < weeklyTarget) milestones.push({ type: 'weekly', title: 'WEEKLY GOAL HIT', subtitle: `${weeklyTarget} workouts this week. Smashed it.` });
  }
  const sortedDates = [...new Set(userLogs.map(l => l.date.slice(0, 10)))].sort();
  let streak = 0;
  if (sortedDates.length > 0) {
    streak = 1;
    for (let i = sortedDates.length - 1; i > 0; i--) {
      const a = new Date(sortedDates[i]); const b = new Date(sortedDates[i - 1]);
      const diff = Math.round((a - b) / (1000 * 60 * 60 * 24));
      if (diff === 1) streak++; else break;
    }
  }
  if ([3, 7, 14, 30].includes(streak)) milestones.push({ type: 'streak', title: `${streak}-DAY STREAK`, subtitle: 'On fire.' });
  return milestones;
};

const detectWeightGoal = (newCheckin, prevCheckins, goals) => {
  const target = goals[newCheckin.user]?.weightTarget;
  if (!target || newCheckin.weight == null) return null;
  const prev = prevCheckins.filter(c => c.user === newCheckin.user && c.weight != null).sort((a, b) => new Date(a.date) - new Date(b.date));
  if (prev.length === 0) return null;
  const startWeight = prev[0].weight;
  const goingDown = target < startWeight;
  const lastBefore = prev[prev.length - 1].weight;
  const justHit = goingDown ? (lastBefore > target && newCheckin.weight <= target) : (lastBefore < target && newCheckin.weight >= target);
  if (justHit) return { type: 'weight-goal', title: 'WEIGHT GOAL HIT', subtitle: `${target} kg target reached.` };
  return null;
};

function usePointerReorder(items, onReorder) {
  const [dragging, setDragging] = useState(null);
  const [overIdx, setOverIdx] = useState(null);
  const ref = useRef({ dragging: null, overIdx: null, rects: [], active: false });
  const cbRef = useRef(onReorder);
  useEffect(() => { cbRef.current = onReorder; }, [onReorder]);
  const beginDrag = (index) => {
    const handleEl = document.querySelector(`[data-handle-idx="${index}"]`);
    const container = handleEl ? handleEl.closest('[data-reorder-list]') : null;
    if (!container) return;
    const cards = Array.from(container.querySelectorAll('[data-reorder-item]'));
    const rects = cards.map(c => { const r = c.getBoundingClientRect(); return { top: r.top, bottom: r.bottom, height: r.height, mid: r.top + r.height / 2 }; });
    ref.current = { dragging: index, overIdx: index, rects, active: true };
    setDragging(index); setOverIdx(index);
  };
  const updateDrag = (clientY) => {
    if (!ref.current.active) return;
    const { rects } = ref.current;
    let target = rects.length - 1;
    for (let i = 0; i < rects.length; i++) { if (clientY < rects[i].mid) { target = i; break; } }
    if (target !== ref.current.overIdx) { ref.current.overIdx = target; setOverIdx(target); }
    const vh = window.innerHeight;
    if (clientY < 80) window.scrollBy({ top: -14 });
    else if (clientY > vh - 80) window.scrollBy({ top: 14 });
  };
  const endDrag = () => {
    if (!ref.current.active) return;
    const { dragging, overIdx } = ref.current;
    if (dragging != null && overIdx != null && dragging !== overIdx) cbRef.current(dragging, overIdx);
    ref.current = { dragging: null, overIdx: null, rects: [], active: false };
    setDragging(null); setOverIdx(null);
  };
  useEffect(() => {
    const onTouchMove = (e) => { if (!ref.current.active) return; e.preventDefault(); updateDrag(e.touches[0].clientY); };
    const onTouchEnd = () => endDrag();
    const onMouseMove = (e) => { if (ref.current.active) updateDrag(e.clientY); };
    const onMouseUp = () => endDrag();
    document.addEventListener('touchmove', onTouchMove, { passive: false });
    document.addEventListener('touchend', onTouchEnd);
    document.addEventListener('touchcancel', onTouchEnd);
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
    return () => {
      document.removeEventListener('touchmove', onTouchMove);
      document.removeEventListener('touchend', onTouchEnd);
      document.removeEventListener('touchcancel', onTouchEnd);
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
    };
  }, []);
  const handleProps = (index) => ({
    'data-handle-idx': index,
    onTouchStart: (e) => { e.stopPropagation(); beginDrag(index); },
    onMouseDown: (e) => { e.preventDefault(); e.stopPropagation(); beginDrag(index); },
    style: { touchAction: 'none', cursor: 'grab' },
  });
  return { dragging, overIdx, handleProps };
}

function SaveToast() {
  const [toast, setToast] = useState(null);
  useEffect(() => {
    let timer;
    const show = (ok) => { setToast({ ok }); clearTimeout(timer); timer = setTimeout(() => setToast(null), 1800); };
    const onSaved = () => show(true);
    const onFailed = () => show(false);
    window.addEventListener('ironlog-saved', onSaved);
    window.addEventListener('ironlog-save-failed', onFailed);
    return () => { clearTimeout(timer); window.removeEventListener('ironlog-saved', onSaved); window.removeEventListener('ironlog-save-failed', onFailed); };
  }, []);
  if (!toast) return null;
  return (
    <div className="fixed left-1/2 -translate-x-1/2 z-[70] pointer-events-none" style={{ bottom: 'calc(env(safe-area-inset-bottom, 0px) + 84px)' }}>
      <div className={`flex items-center gap-2 px-4 py-2.5 rounded-full shadow-lg backdrop-blur border ${toast.ok ? 'bg-green-500/90 border-green-400 text-zinc-950' : 'bg-red-500/90 border-red-400 text-white'}`} style={{ animation: 'toast-in 0.25s ease-out' }}>
        {toast.ok ? <Check size={15} strokeWidth={3} /> : <X size={15} strokeWidth={3} />}
        <span className="font-mono text-xs font-bold tracking-wider">{toast.ok ? 'SAVED' : 'SAVE FAILED'}</span>
      </div>
    </div>
  );
}

function CelebrationOverlay({ celebrations, onDismiss }) {
  if (celebrations.length === 0) return null;
  const c = celebrations[0];
  return <CelebrationCard celebration={c} onDismiss={() => onDismiss(c.id)} />;
}

function CelebrationCard({ celebration, onDismiss }) {
  const [show, setShow] = useState(false);
  useEffect(() => { const t = setTimeout(() => setShow(true), 10); return () => clearTimeout(t); }, []);
  const particles = Array.from({ length: 28 }, (_, i) => {
    const angle = (i / 28) * Math.PI * 2; const distance = 120 + Math.random() * 100; const delay = Math.random() * 0.2; const size = 3 + Math.random() * 5;
    const colors = ['#f59e0b', '#fb923c', '#ef4444', '#fbbf24', '#fde047'];
    return { id: i, x: Math.cos(angle) * distance, y: Math.sin(angle) * distance, delay, size, color: colors[i % colors.length] };
  });
  const isPR = celebration.type?.startsWith('pr-');
  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4" style={{ background: 'rgba(0,0,0,0.7)', backdropFilter: 'blur(8px)' }} onClick={onDismiss}>
      <style>{`
        @keyframes ember-burst { 0% { transform: translate(0,0) scale(0); opacity:1; } 20% { opacity:1; transform: translate(var(--tx),var(--ty)) scale(1); } 100% { transform: translate(calc(var(--tx)*1.6),calc(var(--ty)*1.6+200px)) scale(0.3); opacity:0; } }
        @keyframes badge-in { 0% { transform: scale(0.3) rotate(-12deg); opacity:0; } 60% { transform: scale(1.1) rotate(2deg); opacity:1; } 100% { transform: scale(1) rotate(0deg); opacity:1; } }
        @keyframes ring-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.5); } 50% { box-shadow: 0 0 0 30px rgba(245,158,11,0); } }
        .celeb-pop { animation: badge-in 0.6s cubic-bezier(0.34,1.56,0.64,1); }
        .celeb-ring { animation: ring-pulse 2s ease-in-out infinite; }
        .celeb-ember { position:absolute; top:50%; left:50%; border-radius:50%; animation: ember-burst 1.4s ease-out forwards; }
      `}</style>
      <div className="relative" onClick={e => e.stopPropagation()}>
        {show && particles.map(p => <div key={p.id} className="celeb-ember" style={{ '--tx': `${p.x}px`, '--ty': `${p.y}px`, width: `${p.size}px`, height: `${p.size}px`, background: p.color, boxShadow: `0 0 ${p.size * 2}px ${p.color}`, animationDelay: `${p.delay}s` }} />)}
        <div className="relative celeb-pop bg-gradient-to-br from-zinc-900 to-zinc-950 border border-amber-500/40 rounded-3xl p-8 max-w-sm text-center shadow-2xl shadow-amber-500/20">

            {isPR ? <Award size={36} className="text-zinc-950" strokeWidth={2.5} /> : celebration.type === 'streak' ? <Flame size={36} className="text-zinc-950" strokeWidth={2.5} /> : celebration.type === 'weekly' ? <Target size={36} className="text-zinc-950" strokeWidth={2.5} /> : celebration.type === 'weight-goal' ? <Scale size={36} className="text-zinc-950" strokeWidth={2.5} /> : <Award size={36} className="text-zinc-950" strokeWidth={2.5} />}

          {celebration.exercise && <p className="text-sm text-zinc-400 mt-3">{celebration.exercise}</p>}

function BackupModal({ onImport, onClose }) {
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState(null);
  const fileRef = useRef(null);
  const doExport = async () => {
    setBusy(true); setMsg(null);
    try { await exportAllData(); setMsg({ ok: true, text: 'Backup file downloaded. Keep it safe — reload it any time with Import.' }); }
    catch (e) { setMsg({ ok: false, text: 'Export failed: ' + e.message }); }
    finally { setBusy(false); }
  };
  const handleFile = async (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    setBusy(true); setMsg(null);
    try {
      const text = await file.text(); const clean = parseImportedData(text); await onImport(clean);
      const counts = [];
      if (clean.logs) counts.push(`${clean.logs.length} workouts`);
      if (clean.checkins) counts.push(`${clean.checkins.length} check-ins`);
      if (clean.days) counts.push(`${clean.days.length} saved days`);
      setMsg({ ok: true, text: `Restored ${counts.join(', ') || 'your data'}.` });
    } catch (err) { setMsg({ ok: false, text: 'Could not read that file. Make sure it\'s an IronLog backup.' }); }
    finally { setBusy(false); if (fileRef.current) fileRef.current.value = ''; }
  };
  return (
    <div className="fixed inset-0 z-[59] bg-zinc-950/80 backdrop-blur flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-md p-6 space-y-4" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between">
          <div><p className="font-mono text-[10px] text-zinc-500 tracking-[0.3em]">// DATA</p><h2 className="font-display text-3xl text-zinc-100">BACKUP & RESTORE</h2></div>
          <button onClick={onClose} className="text-zinc-500"><X size={20} /></button>
        </div>
        <p className="text-sm text-zinc-400">Save all your workouts, check-ins and goals to a file you keep. Reload it any time to restore everything — even on a new device.</p>
        <button onClick={doExport} disabled={busy} className="w-full bg-amber-500 text-zinc-950 rounded-xl py-3 font-display text-lg hover:bg-amber-400 transition disabled:opacity-40 flex items-center justify-center gap-2">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          EXPORT MY DATA
        </button>
        <button onClick={() => fileRef.current?.click()} disabled={busy} className="w-full bg-zinc-800 border border-zinc-700 text-zinc-200 rounded-xl py-3 font-display text-lg hover:border-amber-500/50 transition disabled:opacity-40 flex items-center justify-center gap-2">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          IMPORT FROM BACKUP
        </button>
        <input ref={fileRef} type="file" accept="application/json,.json" onChange={handleFile} className="hidden" />
        {msg && <div className={`rounded-xl p-3 text-sm ${msg.ok ? 'bg-green-500/10 border border-green-500/30 text-green-300' : 'bg-red-500/10 border border-red-500/30 text-red-300'}`}>{msg.text}</div>}
        <p className="text-[10px] text-zinc-600 text-center">Tip: export after each session so your latest data is always backed up.</p>
      </div>
    </div>
  );
}

function ActivityCalendar({ user, logs, checkins, weeklyTarget, weeklyProgress, goals, saveGoals }) {
  const [viewMonth, setViewMonth] = useState(() => { const d = new Date(); return { year: d.getFullYear(), month: d.getMonth() }; });
  const [editingGoals, setEditingGoals] = useState(false);
  const today = new Date();
  const todayKey = today.toISOString().slice(0, 10);
  const activity = {};
  logs.filter(l => l.user === user).forEach(l => { const k = l.date.slice(0, 10); activity[k] = activity[k] || {}; activity[k].workout = true; });
  checkins.filter(c => c.user === user).forEach(c => { const k = c.date.slice(0, 10); activity[k] = activity[k] || {}; activity[k].checkin = true; });
  const firstOfMonth = new Date(viewMonth.year, viewMonth.month, 1);
  const lastOfMonth = new Date(viewMonth.year, viewMonth.month + 1, 0);
  const startWeekday = (firstOfMonth.getDay() + 6) % 7;
  const daysInMonth = lastOfMonth.getDate();
  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(viewMonth.year, viewMonth.month, d);
    cells.push({ day: d, key: date.toISOString().slice(0, 10), isToday: date.toISOString().slice(0, 10) === todayKey, isFuture: date > today });
  }
  const monthName = firstOfMonth.toLocaleDateString('en', { month: 'long', year: 'numeric' });
  const canGoNext = !(viewMonth.year === today.getFullYear() && viewMonth.month === today.getMonth());
  const navigate = (dir) => setViewMonth(prev => { const d = new Date(prev.year, prev.month + dir, 1); return { year: d.getFullYear(), month: d.getMonth() }; });
  const monthStats = Object.keys(activity).filter(k => k.startsWith(`${viewMonth.year}-${String(viewMonth.month + 1).padStart(2, '0')}`));
  const monthWorkouts = monthStats.filter(k => activity[k].workout).length;
  const monthCheckins = monthStats.filter(k => activity[k].checkin).length;
  return (
    <div className="bg-zinc-900 border border-zinc-800 rounded-3xl p-5">
      <div className="flex items-center justify-between mb-1">
        <div><p className="font-mono text-[10px] text-zinc-500 tracking-[0.3em]">// ACTIVITY</p><h2 className="font-display text-2xl text-zinc-100">{monthName.toUpperCase()}</h2></div>
        <div className="flex gap-1">
          <button onClick={() => navigate(-1)} className="p-2 text-zinc-400 hover:text-amber-500 transition"><ChevronLeft size={16} /></button>
          <button onClick={() => navigate(1)} disabled={!canGoNext} className="p-2 text-zinc-400 hover:text-amber-500 disabled:opacity-30 disabled:cursor-not-allowed transition"><ChevronRight size={16} /></button>
        </div>
      </div>
      <button onClick={() => setEditingGoals(true)} className="w-full text-left mt-3 bg-zinc-800/50 border border-zinc-800 rounded-xl px-3 py-2 flex items-center justify-between hover:border-amber-500/40 transition">
        <div className="flex-1">
          <div className="flex items-center justify-between text-[10px] font-mono text-zinc-500 tracking-wider mb-1"><span>WEEKLY GOAL</span><span>{weeklyProgress} / {weeklyTarget}</span></div>
          <div className="h-2 bg-zinc-900 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-amber-500 to-orange-500 transition-all" style={{ width: `${Math.min(100, (weeklyProgress / weeklyTarget) * 100)}%` }} /></div>
        </div>
        <Edit2 size={12} className="text-zinc-600 ml-3 shrink-0" />
      </button>
      <div className="grid grid-cols-7 gap-1 mt-4 mb-1">{['M','T','W','T','F','S','S'].map((d, i) => <div key={i} className="text-center text-[9px] font-mono text-zinc-600">{d}</div>)}</div>
      <div className="grid grid-cols-7 gap-1">
        {cells.map((cell, i) => {
          if (!cell) return <div key={i} />;
          const a = activity[cell.key] || {};
          return <div key={cell.key} className="aspect-square flex items-center justify-center relative"><DualRing size={36} hasWorkout={!!a.workout} hasCheckin={!!a.checkin} isToday={cell.isToday} isFuture={cell.isFuture} day={cell.day} /></div>;
        })}
      </div>
      <div className="mt-4 pt-3 border-t border-zinc-800 flex items-center justify-between text-[10px] font-mono">
        <div className="flex items-center gap-3">
          <div className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-full border-2 border-amber-500" /><span className="text-zinc-400">WORKOUT</span></div>
          <div className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-full border-2 border-pink-500" /><span className="text-zinc-400">CHECK-IN</span></div>
        </div>
        <span className="text-zinc-500">{monthWorkouts} W · {monthCheckins} C</span>
      </div>
      {editingGoals && <GoalsModal user={user} goals={goals} saveGoals={saveGoals} onClose={() => setEditingGoals(false)} />}
    </div>
  );
}

function DualRing({ size, hasWorkout, hasCheckin, isToday, isFuture, day }) {
  const cx = size / 2, cy = size / 2, outerR = size / 2 - 2, innerR = outerR - 4;
  const outerC = 2 * Math.PI * outerR, innerC = 2 * Math.PI * innerR;
  return (
    <div className="relative" style={{ width: size, height: size }}>
      <svg width={size} height={size} className="-rotate-90">
        <circle cx={cx} cy={cy} r={outerR} fill="none" stroke="#27272a" strokeWidth="2.5" />
        {hasWorkout && <circle cx={cx} cy={cy} r={outerR} fill="none" stroke="#f59e0b" strokeWidth="2.5" strokeDasharray={outerC} strokeDashoffset={0} strokeLinecap="round" style={{ filter: 'drop-shadow(0 0 4px rgba(245,158,11,0.5))' }} />}
        <circle cx={cx} cy={cy} r={innerR} fill="none" stroke="#27272a" strokeWidth="2.5" />
        {hasCheckin && <circle cx={cx} cy={cy} r={innerR} fill="none" stroke="#ec4899" strokeWidth="2.5" strokeDasharray={innerC} strokeDashoffset={0} strokeLinecap="round" style={{ filter: 'drop-shadow(0 0 4px rgba(236,72,153,0.5))' }} />}
      </svg>
      <div className="absolute inset-0 flex items-center justify-center">
        <span className={`text-[10px] font-mono ${isToday ? 'text-amber-500 font-bold' : isFuture ? 'text-zinc-700' : (hasWorkout || hasCheckin) ? 'text-zinc-200' : 'text-zinc-500'}`}>{day}</span>
      </div>
    </div>
  );
}

function GoalsModal({ user, goals, saveGoals, onClose }) {
  const current = goals[user] || {};
  const [weeklyTarget, setWeeklyTarget] = useState(current.weeklyTarget || 6);
  const [weightTarget, setWeightTarget] = useState(current.weightTarget || '');
  const save = async () => { await saveGoals({ ...goals, [user]: { weeklyTarget: parseInt(weeklyTarget) || 6, weightTarget: weightTarget === '' ? null : parseFloat(weightTarget) } }); onClose(); };
  return (
    <div className="fixed inset-0 z-[55] bg-zinc-950/80 backdrop-blur flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-md p-6 space-y-4" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between">
          <div><p className="font-mono text-[10px] text-zinc-500 tracking-[0.3em]">// GOALS</p><h2 className="font-display text-3xl text-zinc-100">{user.toUpperCase()}'S TARGETS</h2></div>
          <button onClick={onClose} className="text-zinc-500"><X size={20} /></button>
        </div>
        <div>
          <label className="text-[10px] font-mono text-zinc-500 tracking-wider">WORKOUTS PER WEEK</label>
          <div className="flex gap-1.5 mt-2">{[2,3,4,5,6,7].map(n => <button key={n} onClick={() => setWeeklyTarget(n)} className={`flex-1 py-3 rounded-xl font-display text-xl transition ${weeklyTarget === n ? 'bg-amber-500 text-zinc-950' : 'bg-zinc-800 border border-zinc-700 text-zinc-300 hover:border-amber-500/50'}`}>{n}</button>)}</div>
        </div>
        <div>
          <label className="text-[10px] font-mono text-zinc-500 tracking-wider">WEIGHT GOAL (KG) — OPTIONAL</label>
          <input type="number" inputMode="decimal" step="0.1" value={weightTarget} onChange={e => setWeightTarget(e.target.value)} placeholder="e.g. 93.0" className="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 mt-1 font-display text-2xl text-zinc-100 placeholder-zinc-600 focus:border-amber-500 outline-none" />
          <p className="text-[10px] text-zinc-500 mt-1">You'll get a celebration when you hit this on a check-in.</p>
        </div>
        <button onClick={save} className="w-full bg-amber-500 text-zinc-950 rounded-xl py-3 font-display text-lg hover:bg-amber-400 transition">SAVE GOALS</button>
      </div>
    </div>
  );
}

  const colorMap = { orange: 'text-orange-400 border-orange-500/20', amber: 'text-amber-400 border-amber-500/20', rose: 'text-rose-400 border-rose-500/20' };
  return (
    <div className={`bg-zinc-900/60 border ${colorMap[color]} rounded-2xl p-3`}>
      <Icon size={16} className={colorMap[color].split(' ')[0]} />

      <p className="text-[10px] font-mono text-zinc-500 mt-1 tracking-wider">{unit.toUpperCase()}</p>

function DaysTab({ user, days, saveDays, setActiveWorkout, setTab }) {
  const [editingDay, setEditingDay] = useState(null);
  const [building, setBuilding] = useState(null);
  const userDays = days.filter(d => d.user === user);
  const createNew = () => setBuilding({ id: Date.now().toString(), user, name: 'New Day', exercises: [] });
  const saveDay = async (day) => {
    const existing = days.find(d => d.id === day.id);
    await saveDays(existing ? days.map(d => d.id === day.id ? day : d) : [...days, day]);
    setBuilding(null); setEditingDay(null);
  };
  const deleteDay = async (id) => { if (!safeConfirm('Delete this day?')) return; await saveDays(days.filter(d => d.id !== id)); };
  if (building || editingDay) return <DayBuilder day={building || editingDay} onSave={saveDay} onCancel={() => { setBuilding(null); setEditingDay(null); }} />;
  return (
    <div className="space-y-4 pt-2">
      <div><p className="font-mono text-[10px] text-zinc-500 tracking-[0.3em]">// SCHEDULE</p><h1 className="font-display text-4xl text-zinc-100">YOUR DAYS</h1><p className="text-zinc-500 text-sm mt-1">Customise your splits or follow the programme cards.</p></div>
      <button onClick={createNew} className="w-full bg-amber-500 text-zinc-950 rounded-2xl py-4 font-display text-xl flex items-center justify-center gap-2 hover:bg-amber-400 transition"><Plus size={20} /> CREATE NEW DAY</button>
      <div className="space-y-2">
        {userDays.map(day => (
          <div key={day.id} className="bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden">
            <div className="p-4 flex items-center justify-between">
              <div className="flex-1"><p className="font-display text-xl text-zinc-100">{day.name.toUpperCase()}</p><p className="text-xs text-zinc-500 font-mono">{day.exercises.length} exercises</p></div>
              <div className="flex gap-2">
                <button onClick={() => setEditingDay(day)} className="p-2 text-zinc-400 hover:text-amber-500 transition"><Edit2 size={16} /></button>
                <button onClick={() => deleteDay(day.id)} className="p-2 text-zinc-400 hover:text-red-500 transition"><Trash2 size={16} /></button>
                <button onClick={() => setActiveWorkout(day)} className="bg-amber-500 text-zinc-950 px-4 py-2 rounded-full text-xs font-bold flex items-center gap-1">START <ChevronRight size={12} /></button>
              </div>
            </div>
            {day.exercises.length > 0 && (
              <div className="border-t border-zinc-800 px-4 py-2 flex flex-wrap gap-1">
                {day.exercises.map((ex, i) => <span key={i} className="text-[10px] font-mono px-2 py-0.5 rounded-full border" style={{ borderColor: MUSCLE_COLORS[ex.muscle] + '60', color: MUSCLE_COLORS[ex.muscle] }}>{ex.name}</span>)}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function DayBuilder({ day, onSave, onCancel }) {
  const [name, setName] = useState(day.name);
  const [exercises, setExercises] = useState(day.exercises);
  const [picking, setPicking] = useState(false);
  const addExercise = (ex) => { if (exercises.find(e => e.name === ex.name)) return; setExercises([...exercises, ex]); };
  const removeExercise = (i) => setExercises(exercises.filter((_, idx) => idx !== i));
  const move = (from, to) => {
    if (from === to || from == null || to == null || to < 0 || to >= exercises.length) return;
    setExercises(prev => { const next = [...prev]; const [m] = next.splice(from, 1); next.splice(to, 0, m); return next; });
  };
  const { dragging, overIdx, handleProps } = usePointerReorder(exercises, move);
  if (picking) return <ExercisePicker existing={exercises} onAdd={addExercise} onClose={() => setPicking(false)} />;
  return (
    <div className="space-y-4 pt-2">
      <div className="flex items-center gap-3"><button onClick={onCancel} className="p-2 -ml-2 text-zinc-400"><ChevronLeft size={20} /></button><p className="font-mono text-[10px] text-zinc-500 tracking-[0.3em]">// {day.id.length > 5 ? 'EDIT DAY' : 'NEW DAY'}</p></div>
      <input value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Push Day, Legs, Pull..." className="w-full bg-transparent border-b-2 border-zinc-800 focus:border-amber-500 outline-none font-display text-4xl text-zinc-100 placeholder-zinc-700 py-2 transition" />
      <div>
        <div className="flex items-center justify-between mb-2">

        ) : (

            {exercises.map((ex, i) => (
              <div key={i} data-reorder-item className={`bg-zinc-900 border rounded-xl p-3 flex items-center justify-between transition ${overIdx === i && dragging !== null && dragging !== i ? 'border-amber-500 border-2' : 'border-zinc-800'} ${dragging === i ? 'opacity-40 scale-[0.98]' : ''}`}>
                <div className="flex items-center gap-2.5 min-w-0">
                  <div {...handleProps(i)} className="cursor-grab active:cursor-grabbing text-zinc-500 hover:text-amber-500 touch-none select-none p-2 -m-1"><GripIcon /></div>
                  <div className="w-1 h-8 rounded-full shrink-0" style={{ background: MUSCLE_COLORS[ex.muscle] }} />
                  <div className="min-w-0"><p className="text-zinc-100 text-sm truncate">{ex.name}</p><p className="text-[10px] font-mono text-zinc-500">{ex.muscle.toUpperCase()} · {ex.equipment.toUpperCase()}</p></div>
                </div>
                <div className="flex items-center gap-0.5 shrink-0">
                  <button onClick={() => move(i, i-1)} disabled={i===0} className="p-1 text-zinc-500 hover:text-amber-500 disabled:opacity-20"><ChevronUpIcon /></button>
                  <button onClick={() => move(i, i+1)} disabled={i===exercises.length-1} className="p-1 text-zinc-500 hover:text-amber-500 disabled:opacity-20"><ChevronDownIcon /></button>
                  <button onClick={() => removeExercise(i)} className="text-zinc-500 hover:text-red-500 p-1 ml-1"><X size={16} /></button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
      <div className="flex gap-2 pt-2">
        <button onClick={onCancel} className="flex-1 border border-zinc-800 text-zinc-400 rounded-xl py-3 font-mono text-sm">CANCEL</button>
        <button onClick={() => onSave({ ...day, name: name || 'Untitled', exercises })} disabled={exercises.length === 0} className="flex-1 bg-amber-500 text-zinc-950 rounded-xl py-3 font-display text-lg disabled:opacity-40 disabled:cursor-not-allowed hover:bg-amber-400 transition">SAVE DAY</button>
      </div>
    </div>
  );
}

function WorkoutSession({ user, day, logs, saveLogs, days, saveDays, goals, triggerCelebration, onClose }) {
  const [sessionExercises, setSessionExercises] = useState(day.sessionExercises || day.exercises.map(ex => ({ ...ex, sets: [{ weight: '', reps: '', done: false }], groupId: ex.groupId || null })));
  const [startTime] = useState(day.startTime || Date.now());
  const [savedAsDay, setSavedAsDay] = useState(false);
  const [addingExercise, setAddingExercise] = useState(false);
  const [addingPairFor, setAddingPairFor] = useState(null);
  const [savingAs, setSavingAs] = useState(false);
  const [coachOpen, setCoachOpen] = useState(false);
  const [coachContext, setCoachContext] = useState(null);
  const [structureModified, setStructureModified] = useState(false);
  const [pendingClose, setPendingClose] = useState(false);

  const addExerciseToSession = (ex) => { setSessionExercises(prev => [...prev, { ...ex, sets: [{ weight: '', reps: '', done: false }], groupId: null }]); setStructureModified(true); setAddingExercise(false); };

  const addPairedExercise = (ex) => {
    setSessionExercises(prev => {
      const anchor = prev[addingPairFor]; let groupId = anchor.groupId; const next = [...prev];
      if (!groupId) { groupId = 'g' + Date.now(); next[addingPairFor] = { ...anchor, groupId }; }
      let pos = addingPairFor + 1;
      while (pos < next.length && next[pos].groupId === groupId) pos++;
      next.splice(pos, 0, { ...ex, sets: [{ weight: '', reps: '', done: false }], groupId });
      return next;
    });
    setStructureModified(true); setAddingPairFor(null);
  };

  const removeExerciseFromSession = (idx) => {
    if (!safeConfirm('Remove this exercise from the workout?')) return;
    setSessionExercises(prev => { const next = prev.filter((_, i) => i !== idx); const counts = {}; next.forEach(e => { if (e.groupId) counts[e.groupId] = (counts[e.groupId] || 0) + 1; }); return next.map(e => (e.groupId && counts[e.groupId] < 2) ? { ...e, groupId: null } : e); });
    setStructureModified(true);
  };

  const toggleSupersetWithPrevious = (idx) => {
    setSessionExercises(prev => {
      if (idx === 0) return prev;
      const next = [...prev]; const cur = next[idx]; const above = next[idx - 1];
      if (cur.groupId && cur.groupId === above.groupId) {
        const gid = cur.groupId; next[idx] = { ...cur, groupId: null };
        const remaining = next.filter(e => e.groupId === gid).length;
        if (remaining < 2) return next.map(e => e.groupId === gid ? { ...e, groupId: null } : e);
        return next;
      } else {
        let gid = above.groupId;
        if (!gid) { gid = 'g' + Date.now(); next[idx - 1] = { ...above, groupId: gid }; }
        next[idx] = { ...cur, groupId: gid }; return next;
      }
    });
  };

  const moveExercise = (from, to) => {
    if (from === to || from == null || to == null) return;
    setSessionExercises(prev => { const next = [...prev]; const [moved] = next.splice(from, 1); next.splice(to, 0, moved); const counts = {}; next.forEach(e => { if (e.groupId) counts[e.groupId] = (counts[e.groupId] || 0) + 1; }); return next.map(e => (e.groupId && counts[e.groupId] < 2) ? { ...e, groupId: null } : e); });
  };

  const { dragging, overIdx, handleProps } = usePointerReorder(sessionExercises, moveExercise);

  useEffect(() => { storage.set('activeSession', { ...day, sessionExercises, startTime }); }, [sessionExercises, startTime, day]);

  const clearActive = async () => { await storage.delete('activeSession'); };

  const saveAsPersonalDay = async (customName) => {
    const newDay = { id: Date.now().toString(), user, name: customName || day.name, exercises: sessionExercises.map(({ name, muscle, equipment, groupId }) => ({ name, muscle, equipment, groupId: groupId || null })) };
    await saveDays([...days, newDay]); setSavedAsDay(true); setSavingAs(false); setStructureModified(false);
    if (pendingClose) { setPendingClose(false); onClose(); }
  };

  const updateSet = (exIdx, setIdx, field, value) => { setSessionExercises(prev => { const next = [...prev]; next[exIdx] = { ...next[exIdx], sets: [...next[exIdx].sets] }; next[exIdx].sets[setIdx] = { ...next[exIdx].sets[setIdx], [field]: value }; return next; }); };
  const addSet = (exIdx) => { setSessionExercises(prev => { const next = [...prev]; const lastSet = next[exIdx].sets[next[exIdx].sets.length - 1]; next[exIdx] = { ...next[exIdx], sets: [...next[exIdx].sets, { weight: lastSet?.weight || '', reps: lastSet?.reps || '', done: false }] }; return next; }); };
  const removeSet = (exIdx, setIdx) => { setSessionExercises(prev => { const next = [...prev]; next[exIdx] = { ...next[exIdx], sets: next[exIdx].sets.filter((_, i) => i !== setIdx) }; return next; }); };

  // Pre-fill empty sets of an exercise with a progression target
  const applyTargetToExercise = (exIdx, target) => {
    setSessionExercises(prev => {
      const next = [...prev];
      const ex = { ...next[exIdx], sets: next[exIdx].sets.map(s => ({ ...s })) };
      const repVal = String(target.repsMin);
      ex.sets = ex.sets.map(s => (!s.done && s.weight === '' && s.reps === '') ? { ...s, weight: String(target.weight), reps: repVal } : s);
      next[exIdx] = ex;
      return next;
    });
  };

  const toggleDone = (exIdx, setIdx) => {
    setSessionExercises(prev => {
      const next = [...prev]; next[exIdx] = { ...next[exIdx], sets: [...next[exIdx].sets] };
      const wasDone = next[exIdx].sets[setIdx].done;
      next[exIdx].sets[setIdx] = { ...next[exIdx].sets[setIdx], done: !wasDone };
      if (!wasDone) { const s = next[exIdx].sets[setIdx]; const flag = detectSetIssue(parseInt(s.reps), s.rir === '' || s.rir == null ? null : parseInt(s.rir)); if (flag) { setTimeout(() => { setCoachContext({ exIdx, setIdx, autoFlag: flag }); setCoachOpen(true); }, 150); } }
      return next;
    });
  };

  const finish = async () => {
    const log = { id: Date.now().toString(), user, dayId: day.id, dayName: day.name, date: new Date().toISOString(), duration: Math.round((Date.now() - startTime) / 60000), exercises: sessionExercises.map(ex => ({ name: ex.name, muscle: ex.muscle, sets: ex.sets.filter(s => s.done && s.weight !== '' && s.reps !== '').map(s => ({ weight: parseFloat(s.weight), reps: parseInt(s.reps), ...(s.rir != null && s.rir !== '' ? { rir: parseInt(s.rir) } : {}) })) })).filter(ex => ex.sets.length > 0) };
    if (log.exercises.length === 0) { if (!safeConfirm('No sets completed. Discard?')) return; await clearActive(); onClose(); return; }
    await saveLogs([...logs, log]);
    const prs = detectPRs(log, logs); const milestones = detectMilestones(log, logs, goals || {});
    [...prs, ...milestones].forEach(triggerCelebration);
    await clearActive();
    if (structureModified && !savedAsDay) { setPendingClose(true); setSavingAs(true); return; }
    onClose();
  };

  const handleClose = async () => {
    const anyProgress = sessionExercises.some(ex => ex.sets.some(s => s.done || s.weight || s.reps));
    if (anyProgress) { const choice = safeConfirm('Save and exit? OK = save progress so you can resume later. Cancel = discard this session.'); if (!choice) await clearActive(); }
    onClose();
  };

  const totalSets = sessionExercises.reduce((s, ex) => s + ex.sets.filter(set => set.done).length, 0);

  return (
    <div className="fixed inset-0 bg-zinc-950 z-50 overflow-y-auto pb-32">
      <header className="sticky top-0 bg-zinc-950/95 backdrop-blur border-b border-zinc-800 z-10">
        <div className="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
          <button onClick={handleClose} className="text-zinc-400 hover:text-zinc-100"><X size={20} /></button>
          <div className="text-center"><p className="font-mono text-[10px] text-zinc-500 tracking-[0.3em]">// IN SESSION</p><p className="font-display text-xl text-amber-500 leading-tight">{day.name.toUpperCase()}</p></div>
          <div className="flex items-center gap-2">
            <button onClick={() => { setCoachContext(null); setCoachOpen(true); }} className="bg-zinc-800 border border-amber-500/40 text-amber-400 px-2.5 py-1.5 rounded-full text-xs font-bold flex items-center gap-1 hover:bg-zinc-700 transition"><Flame size={12} /> COACH</button>
            <button onClick={finish} className="bg-amber-500 text-zinc-950 px-3 py-1.5 rounded-full text-xs font-bold">FINISH</button>
          </div>
        </div>
        <div className="max-w-3xl mx-auto px-4 pb-2 flex justify-between text-[10px] font-mono text-zinc-500"><span>{totalSets} SETS DONE</span><span>{Math.round((Date.now() - startTime) / 60000)} MIN</span></div>
      </header>

      <main className="max-w-3xl mx-auto px-4 pt-4 space-y-4" data-reorder-list>
        {day.sessionExercises && <div className="bg-amber-500/10 border border-amber-500/30 rounded-2xl p-3 flex items-center gap-2"><Flame size={14} className="text-amber-400" /><p className="text-xs text-amber-300">Session restored. Pick up where you left off.</p></div>}
        {day.isTemplate && !savedAsDay && !day.sessionExercises && (
          <div className="bg-zinc-900 border border-amber-500/30 rounded-2xl p-3 flex items-center justify-between">
            <div className="flex-1 pr-3"><p className="font-mono text-[10px] text-amber-500 tracking-wider">// PROGRAMME WORKOUT</p><p className="text-xs text-zinc-300 mt-0.5">Love this session? Save it to "Your Days".</p></div>
            <button onClick={() => setSavingAs(true)} className="bg-amber-500/10 border border-amber-500/40 text-amber-400 px-3 py-1.5 rounded-full text-[11px] font-mono whitespace-nowrap hover:bg-amber-500/20 transition">+ SAVE DAY</button>
          </div>
        )}
        {day.isTemplate && savedAsDay && <div className="bg-green-500/10 border border-green-500/30 rounded-2xl p-3 flex items-center gap-2"><Check size={14} className="text-green-400" /><p className="text-xs text-green-300">Saved to "Your Days".</p></div>}
        {structureModified && !savedAsDay && (
          <div className="bg-zinc-900 border border-amber-500/40 rounded-2xl p-3 flex items-center justify-between">
            <div className="flex-1 pr-3"><p className="font-mono text-[10px] text-amber-500 tracking-wider">// WORKOUT EDITED</p><p className="text-xs text-zinc-300 mt-0.5">You've changed the exercises. Save this as a custom workout to keep it.</p></div>
            <button onClick={() => setSavingAs(true)} className="bg-amber-500 text-zinc-950 px-3 py-1.5 rounded-full text-[11px] font-bold whitespace-nowrap hover:bg-amber-400 transition">SAVE AS NEW</button>
          </div>
        )}
        {sessionExercises.map((ex, exIdx) => {
          const prevLog = [...logs].reverse().find(l => l.user === user && l.exercises.find(e => e.name === ex.name));
          const prevSets = prevLog?.exercises.find(e => e.name === ex.name)?.sets || [];
          const target = getProgressionTarget(ex.name, ex.equipment, user, logs);
          const inGroup = !!ex.groupId;
          const prevInSameGroup = exIdx > 0 && sessionExercises[exIdx - 1].groupId === ex.groupId && inGroup;
          const nextInSameGroup = exIdx < sessionExercises.length - 1 && sessionExercises[exIdx + 1].groupId === ex.groupId && inGroup;
          let groupLabel = null;
          if (inGroup) { const members = sessionExercises.filter(e => e.groupId === ex.groupId); const posInGroup = members.findIndex(e => e === ex); const groupIndex = [...new Set(sessionExercises.filter(e => e.groupId).map(e => e.groupId))].indexOf(ex.groupId); groupLabel = `${String.fromCharCode(65 + groupIndex)}${posInGroup + 1}`; }
          return (
            <div key={exIdx} data-reorder-item className={`relative transition ${overIdx === exIdx && dragging !== null && dragging !== exIdx ? 'ring-2 ring-amber-500 rounded-2xl' : ''} ${dragging === exIdx ? 'opacity-40 scale-[0.98]' : ''}`} style={{ marginTop: prevInSameGroup ? '-12px' : undefined }}>
              {inGroup && <div className="absolute left-0 top-0 bottom-0 w-1 bg-gradient-to-b from-amber-500 to-orange-600" style={{ borderTopLeftRadius: prevInSameGroup ? 0 : 12, borderBottomLeftRadius: nextInSameGroup ? 0 : 12 }} />}
              <div className={`bg-zinc-900 border rounded-2xl p-4 ${inGroup ? 'border-amber-500/30 ml-1.5' : 'border-zinc-800'}`}>
                {exIdx > 0 && <button onClick={() => toggleSupersetWithPrevious(exIdx)} className={`absolute -top-2.5 left-1/2 -translate-x-1/2 z-10 px-2 py-0.5 rounded-full text-[9px] font-mono tracking-wider border transition ${prevInSameGroup ? 'bg-amber-500 border-amber-500 text-zinc-950' : 'bg-zinc-800 border-zinc-700 text-zinc-400 hover:border-amber-500/50'}`}>{prevInSameGroup ? '⛓ SUPERSET' : '+ LINK ABOVE'}</button>}
                <div className="flex items-center gap-2.5 mb-3">
                  <div {...handleProps(exIdx)} className="cursor-grab active:cursor-grabbing text-zinc-500 hover:text-amber-500 touch-none select-none p-2 -m-1" title="Hold and drag to reorder"><GripIcon /></div>
                  <div className="w-1 h-10 rounded-full" style={{ background: MUSCLE_COLORS[ex.muscle] }} />
                  <div className="flex-1">
                    <div className="flex items-center gap-2">{groupLabel && <span className="font-mono text-[10px] bg-amber-500/20 text-amber-400 px-1.5 py-0.5 rounded">{groupLabel}</span>}<p className="font-display text-xl text-zinc-100">{ex.name}</p></div>
                    <p className="text-[10px] font-mono text-zinc-500">{ex.muscle.toUpperCase()} · {ex.equipment.toUpperCase()}</p>
                  </div>
                  <button onClick={() => removeExerciseFromSession(exIdx)} className="text-zinc-600 hover:text-red-500 p-1"><X size={14} /></button>
                </div>

                {target ? (
                  <div className="mb-3 bg-gradient-to-r from-amber-500/10 to-orange-500/5 border border-amber-500/25 rounded-xl p-3">
                    <div className="flex items-center justify-between">
                      <div className="min-w-0">
                        <div className="flex items-center gap-1.5"><ArrowUp size={11} className="text-amber-400 shrink-0" /><p className="font-mono text-[9px] text-amber-500 tracking-[0.2em]">NEXT TARGET</p></div>
                        <p className="font-display text-2xl text-amber-400 leading-tight mt-0.5">{target.weight}<span className="text-sm text-zinc-400">kg</span><span className="text-zinc-500 text-lg"> × </span>{target.repsMin === target.repsMax ? target.repsMin : `${target.repsMin}–${target.repsMax}`}<span className="text-sm text-zinc-400"> reps</span></p>
                        <p className="text-[10px] text-zinc-400 mt-0.5 truncate">{target.note}</p>
                        <p className="text-[9px] font-mono text-zinc-600 mt-0.5">LAST: {target.prevWeight}kg × {target.prevReps}{target.prevRIR != null ? ` @${target.prevRIR}RIR` : ''} · {new Date(target.date).toLocaleDateString()}</p>
                      </div>
                      <button onClick={() => applyTargetToExercise(exIdx, target)} className="shrink-0 bg-amber-500 text-zinc-950 rounded-lg px-2.5 py-2 text-[10px] font-mono font-bold hover:bg-amber-400 transition flex items-center gap-1" title="Pre-fill empty sets with this target"><Check size={12} /> USE</button>
                    </div>
                  </div>
                ) : prevSets.length === 0 ? (
                  <div className="mb-3 bg-zinc-800/40 border border-zinc-700/40 rounded-xl p-2.5"><p className="text-[10px] font-mono text-zinc-500">FIRST TIME — log it and we'll suggest a target next session.</p></div>
                ) : null}

                {prevSets.length > 0 && <div className="mb-2 text-[10px] font-mono text-zinc-500">LAST: {prevSets.map(s => `${s.weight}×${s.reps}`).join(' · ')}</div>}
                <div className="space-y-1.5">
                  <div className="grid grid-cols-12 gap-1.5 text-[10px] font-mono text-zinc-500 px-1"><div className="col-span-1">SET</div><div className="col-span-3">WEIGHT</div><div className="col-span-3">REPS</div><div className="col-span-2">RIR</div><div className="col-span-3 text-right">DONE</div></div>
                  {ex.sets.map((set, setIdx) => (
                    <div key={setIdx} className={`grid grid-cols-12 gap-1.5 items-center rounded-lg px-1 py-1 ${set.done ? 'bg-green-500/10' : ''}`}>
                      <div className="col-span-1 font-mono text-sm text-zinc-400">{setIdx + 1}</div>
                      <div className="col-span-3"><input type="number" inputMode="decimal" value={set.weight} onChange={e => updateSet(exIdx, setIdx, 'weight', e.target.value)} placeholder="kg" className="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-2 py-1.5 text-sm text-zinc-100 placeholder-zinc-600 focus:border-amber-500 outline-none" /></div>
                      <div className="col-span-3"><input type="number" inputMode="numeric" value={set.reps} onChange={e => updateSet(exIdx, setIdx, 'reps', e.target.value)} placeholder="reps" className="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-2 py-1.5 text-sm text-zinc-100 placeholder-zinc-600 focus:border-amber-500 outline-none" /></div>
                      <div className="col-span-2"><input type="number" inputMode="numeric" value={set.rir ?? ''} onChange={e => updateSet(exIdx, setIdx, 'rir', e.target.value)} placeholder="–" className="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-1.5 py-1.5 text-sm text-zinc-100 placeholder-zinc-600 focus:border-amber-500 outline-none text-center" title="Reps in reserve" /></div>
                      <div className="col-span-3 flex justify-end gap-1">
                        <button onClick={() => toggleDone(exIdx, setIdx)} className={`p-1.5 rounded-lg transition ${set.done ? 'bg-green-500 text-zinc-950' : 'bg-zinc-800 text-zinc-500 hover:text-zinc-300'}`}><Check size={14} /></button>
                        {ex.sets.length > 1 && <button onClick={() => removeSet(exIdx, setIdx)} className="p-1.5 rounded-lg bg-zinc-800 text-zinc-500 hover:text-red-500"><X size={14} /></button>}
                      </div>
                    </div>
                  ))}
                  <div className="flex gap-1.5 mt-2">
                    <button onClick={() => addSet(exIdx)} className="flex-1 border border-dashed border-zinc-700 rounded-lg py-1.5 text-xs text-zinc-500 hover:text-amber-500 hover:border-amber-500/50 transition flex items-center justify-center gap-1"><Plus size={12} /> ADD SET</button>
                    <button onClick={() => setAddingPairFor(exIdx)} className="flex-1 border border-dashed border-amber-500/30 rounded-lg py-1.5 text-xs text-amber-500/80 hover:text-amber-400 hover:border-amber-500/60 transition flex items-center justify-center gap-1">⛓ PAIR EXERCISE</button>
                  </div>
                </div>
              </div>
            </div>
          );
        })}
        <div className="grid grid-cols-2 gap-2 pt-2">
          <button onClick={() => setAddingExercise(true)} className="bg-zinc-900 border border-zinc-800 rounded-2xl py-4 font-display text-base text-zinc-200 flex items-center justify-center gap-2 hover:border-amber-500/50 transition"><Plus size={16} /> ADD EXERCISE</button>
          <button onClick={() => setSavingAs(true)} className="bg-zinc-900 border border-zinc-800 rounded-2xl py-4 font-display text-base text-zinc-200 flex items-center justify-center gap-2 hover:border-amber-500/50 transition"><Award size={16} /> SAVE AS WORKOUT</button>
        </div>
      </main>

      {addingExercise && (
        <div className="fixed inset-0 z-[55] bg-zinc-950 overflow-y-auto pb-12">
          <header className="sticky top-0 bg-zinc-950/95 backdrop-blur border-b border-zinc-800 z-10"><div className="max-w-3xl mx-auto px-4 py-3 flex items-center gap-3"><button onClick={() => setAddingExercise(false)} className="text-zinc-400"><X size={20} /></button><div><p className="font-mono text-[10px] text-zinc-500 tracking-[0.3em]">// ADD TO SESSION</p><p className="font-display text-lg text-amber-500 leading-tight">PICK EXERCISE</p></div></div></header>
          <main className="max-w-3xl mx-auto px-4 pt-4"><InlineExercisePicker existing={sessionExercises} onAdd={addExerciseToSession} /></main>
        </div>
      )}
      {savingAs && <SaveWorkoutModal defaultName={structureModified ? `${day.name} (Custom)` : day.name} forced={pendingClose} onSave={saveAsPersonalDay} onClose={() => { setSavingAs(false); if (pendingClose) { setPendingClose(false); onClose(); } }} />}
      {addingPairFor != null && (
        <div className="fixed inset-0 z-[55] bg-zinc-950 overflow-y-auto pb-12">
          <header className="sticky top-0 bg-zinc-950/95 backdrop-blur border-b border-zinc-800 z-10"><div className="max-w-3xl mx-auto px-4 py-3 flex items-center gap-3"><button onClick={() => setAddingPairFor(null)} className="text-zinc-400"><X size={20} /></button><div><p className="font-mono text-[10px] text-amber-500 tracking-[0.3em]">// SUPERSET PARTNER</p><p className="font-display text-lg text-amber-500 leading-tight">PAIR WITH {sessionExercises[addingPairFor]?.name?.toUpperCase()}</p></div></div></header>
          <main className="max-w-3xl mx-auto px-4 pt-4"><InlineExercisePicker existing={sessionExercises} onAdd={addPairedExercise} /></main>
        </div>
      )}
      {coachOpen && <AICoachPanel user={user} sessionExercises={sessionExercises} context={coachContext} logs={logs} onApplyAdjustment={(exIdx, setIdx, patch) => { setSessionExercises(prev => { const next = [...prev]; next[exIdx] = { ...next[exIdx], sets: [...next[exIdx].sets] }; next[exIdx].sets[setIdx] = { ...next[exIdx].sets[setIdx], ...patch }; return next; }); }} onClose={() => { setCoachOpen(false); setCoachContext(null); }} />}
    </div>
  );
}

function ProgressTab({ user, logs, checkins }) {
  const [range, setRange] = useState(30);
  const [section, setSection] = useState('overview');
  const userLogs = logs.filter(l => l.user === user);
  const userCheckins = checkins.filter(c => c.user === user);
  const now = new Date();
  const cutoff = new Date(now); cutoff.setDate(cutoff.getDate() - range);
  const rangedLogs = range === 0 ? userLogs : userLogs.filter(l => new Date(l.date) >= cutoff);
  if (userLogs.length === 0) return <div className="space-y-5 pt-2"><div><p className="font-mono text-[10px] text-zinc-500 tracking-[0.3em]">// ANALYTICS</p><h1 className="font-display text-4xl text-zinc-100">PROGRESS</h1></div><div className="border border-dashed border-zinc-800 rounded-2xl p-12 text-center"><TrendingUp className="mx-auto mb-3 text-zinc-700" size={32} /><p className="text-zinc-500 text-sm">Log a workout to start seeing progress.</p></div></div>;
  return (
    <div className="space-y-4 pt-2">
      <div><p className="font-mono text-[10px] text-zinc-500 tracking-[0.3em]">// ANALYTICS</p><h1 className="font-display text-4xl text-zinc-100">PROGRESS</h1></div>
      <div className="flex bg-zinc-900 border border-zinc-800 rounded-full p-0.5">
        <button onClick={() => setSection('overview')} className={`flex-1 py-2 text-[11px] font-mono rounded-full transition ${section === 'overview' ? 'bg-amber-500 text-zinc-950' : 'text-zinc-400'}`}>OVERVIEW</button>
        <button onClick={() => setSection('exercise')} className={`flex-1 py-2 text-[11px] font-mono rounded-full transition ${section === 'exercise' ? 'bg-amber-500 text-zinc-950' : 'text-zinc-400'}`}>BY EXERCISE</button>
      </div>
      <div className="flex gap-1.5 overflow-x-auto pb-1" style={{ scrollbarWidth: 'none' }}>
        {[{ label: '7D', days: 7 }, { label: '30D', days: 30 }, { label: '90D', days: 90 }, { label: '1Y', days: 365 }, { label: 'ALL', days: 0 }].map(r => <button key={r.label} onClick={() => setRange(r.days)} className={`shrink-0 px-3 py-1.5 rounded-full text-[11px] font-mono tracking-wider transition border ${range === r.days ? 'bg-amber-500 border-amber-500 text-zinc-950' : 'border-zinc-800 text-zinc-400 hover:border-zinc-600'}`}>{r.label}</button>)}
      </div>
      {section === 'overview' && <OverviewSection rangedLogs={rangedLogs} userLogs={userLogs} userCheckins={userCheckins} range={range} />}
      {section === 'exercise' && <ExerciseDeepDive userLogs={userLogs} rangedLogs={rangedLogs} />}
    </div>
  );
}

function OverviewSection({ rangedLogs, userLogs, userCheckins, range }) {
  const totalWorkouts = rangedLogs.length;
  const totalSets = rangedLogs.reduce((s, l) => s + l.exercises.reduce((a, e) => a + e.sets.length, 0), 0);
  const totalVolume = rangedLogs.reduce((s, l) => s + l.exercises.reduce((a, e) => a + e.sets.reduce((b, set) => b + set.weight * set.reps, 0), 0), 0);
  const totalDuration = rangedLogs.reduce((s, l) => s + (l.duration || 0), 0);
  const avgDuration = totalWorkouts > 0 ? Math.round(totalDuration / totalWorkouts) : 0;
  const weekBuckets = {};
  rangedLogs.forEach(l => { const k = getWeekKey(l.date); weekBuckets[k] = (weekBuckets[k] || 0) + 1; });
  const freqData = Object.keys(weekBuckets).sort().slice(-12).map(k => ({ week: new Date(k).toLocaleDateString('en', { month: 'short', day: 'numeric' }), sessions: weekBuckets[k] }));
  const volByWeek = {};
  rangedLogs.forEach(l => { const k = getWeekKey(l.date); const v = l.exercises.reduce((a, e) => a + e.sets.reduce((b, s) => b + s.weight * s.reps, 0), 0); volByWeek[k] = (volByWeek[k] || 0) + v; });
  const volData = Object.keys(volByWeek).sort().slice(-12).map(k => ({ week: new Date(k).toLocaleDateString('en', { month: 'short', day: 'numeric' }), volume: Math.round(volByWeek[k]) }));
  const muscleData = {};
  rangedLogs.forEach(l => l.exercises.forEach(e => { muscleData[e.muscle] = (muscleData[e.muscle] || 0) + e.sets.length; }));
  const muscleChart = Object.entries(muscleData).sort((a, b) => b[1] - a[1]).map(([m, sets]) => ({ muscle: m, sets, fill: MUSCLE_COLORS[m] }));
  const totalMuscleSets = muscleChart.reduce((s, m) => s + m.sets, 0);
  const exerciseFreq = {};
  rangedLogs.forEach(l => l.exercises.forEach(e => { exerciseFreq[e.name] = exerciseFreq[e.name] || { count: 0, muscle: e.muscle, sets: 0, volume: 0 }; exerciseFreq[e.name].count += 1; exerciseFreq[e.name].sets += e.sets.length; exerciseFreq[e.name].volume += e.sets.reduce((s, set) => s + set.weight * set.reps, 0); }));
  const topExercises = Object.entries(exerciseFreq).sort((a, b) => b[1].count - a[1].count).slice(0, 5);
  const prs = []; const userPRTracking = {};
  [...userLogs].sort((a, b) => new Date(a.date) - new Date(b.date)).forEach(log => { log.exercises.forEach(ex => { const maxThisSession = Math.max(...ex.sets.map(s => s.weight)); const prev = userPRTracking[ex.name]; if (prev == null || maxThisSession > prev) { if (prev != null) { const topSet = ex.sets.find(s => s.weight === maxThisSession); prs.push({ exercise: ex.name, muscle: ex.muscle, weight: maxThisSession, reps: topSet?.reps || 0, date: log.date, prev }); } userPRTracking[ex.name] = maxThisSession; } }); });
  const recentPRs = [...prs].reverse().slice(0, 6);
  const weightCheckins = userCheckins.filter(c => c.weight != null).sort((a, b) => new Date(a.date) - new Date(b.date));
  const weightInRange = range === 0 ? weightCheckins : weightCheckins.filter(c => new Date(c.date) >= new Date(Date.now() - range * 86400000));
  return (
    <div className="space-y-4">
      <div className="grid grid-cols-2 gap-2">
        <SummaryStat icon={Calendar} label="WORKOUTS" value={totalWorkouts} sub="sessions" color="amber" />
        <SummaryStat icon={Target} label="SETS" value={totalSets} sub="total" color="orange" />
        <SummaryStat icon={Dumbbell} label="VOLUME" value={`${Math.round(totalVolume / 1000)}k`} sub="kg lifted" color="rose" />
        <SummaryStat icon={Flame} label="AVG TIME" value={avgDuration || '—'} sub="min per session" color="red" />
      </div>
      {recentPRs.length > 0 && <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4"><div className="flex items-center justify-between mb-3"><p className="font-mono text-[10px] text-zinc-500 tracking-wider">RECENT PRS</p><Award size={14} className="text-amber-500" /></div><div className="space-y-1.5">{recentPRs.map((pr, i) => <div key={i} className="flex items-center justify-between py-1.5"><div className="flex items-center gap-2.5"><div className="w-1 h-7 rounded-full" style={{ background: MUSCLE_COLORS[pr.muscle] }} /><div><p className="text-sm text-zinc-200">{pr.exercise}</p><p className="text-[10px] font-mono text-zinc-500">{new Date(pr.date).toLocaleDateString()} · prev {pr.prev}kg</p></div></div><div className="text-right"><p className="font-display text-xl text-amber-500 leading-none">{pr.weight}<span className="text-xs text-zinc-500"> kg</span></p><p className="text-[10px] font-mono text-zinc-500">× {pr.reps}</p></div></div>)}</div></div>}
      {freqData.length > 0 && <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4"><p className="font-mono text-[10px] text-zinc-500 tracking-wider mb-3">FREQUENCY (WORKOUTS PER WEEK)</p><ResponsiveContainer width="100%" height={150}><BarChart data={freqData}><CartesianGrid stroke="#27272a" strokeDasharray="3 3" vertical={false} /><XAxis dataKey="week" stroke="#71717a" fontSize={9} /><YAxis stroke="#71717a" fontSize={9} allowDecimals={false} /><Tooltip contentStyle={{ background: '#18181b', border: '1px solid #3f3f46', borderRadius: 8, fontSize: 12 }} /><Bar dataKey="sessions" fill="#10b981" radius={[4,4,0,0]} /></BarChart></ResponsiveContainer></div>}
      {volData.length > 0 && <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4"><p className="font-mono text-[10px] text-zinc-500 tracking-wider mb-3">VOLUME (KG / WEEK)</p><ResponsiveContainer width="100%" height={150}><BarChart data={volData}><CartesianGrid stroke="#27272a" strokeDasharray="3 3" vertical={false} /><XAxis dataKey="week" stroke="#71717a" fontSize={9} /><YAxis stroke="#71717a" fontSize={9} /><Tooltip contentStyle={{ background: '#18181b', border: '1px solid #3f3f46', borderRadius: 8, fontSize: 12 }} /><Bar dataKey="volume" fill="#f59e0b" radius={[4,4,0,0]} /></BarChart></ResponsiveContainer></div>}
      {muscleChart.length > 0 && <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4"><p className="font-mono text-[10px] text-zinc-500 tracking-wider mb-3">MUSCLE FOCUS</p><div className="space-y-2">{muscleChart.map(m => <div key={m.muscle}><div className="flex justify-between text-[11px] mb-0.5"><span className="text-zinc-300">{m.muscle}</span><span className="font-mono text-zinc-500">{m.sets} sets · {Math.round((m.sets / totalMuscleSets) * 100)}%</span></div><div className="h-2 bg-zinc-800 rounded-full overflow-hidden"><div className="h-full rounded-full transition-all" style={{ width: `${(m.sets / totalMuscleSets) * 100}%`, background: m.fill }} /></div></div>)}</div></div>}
      {topExercises.length > 0 && <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4"><p className="font-mono text-[10px] text-zinc-500 tracking-wider mb-3">MAIN EXERCISES</p><div className="space-y-2">{topExercises.map(([name, data]) => <div key={name} className="flex items-center justify-between"><div className="flex items-center gap-2.5"><div className="w-1 h-7 rounded-full" style={{ background: MUSCLE_COLORS[data.muscle] }} /><div><p className="text-sm text-zinc-200">{name}</p><p className="text-[10px] font-mono text-zinc-500">{data.sets} sets · {Math.round(data.volume / 1000)}k kg</p></div></div><span className="font-display text-2xl text-zinc-100">{data.count}<span className="text-[10px] text-zinc-500 ml-0.5">×</span></span></div>)}</div></div>}
      {weightInRange.length >= 2 && <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4"><p className="font-mono text-[10px] text-zinc-500 tracking-wider mb-3">BODY WEIGHT TREND</p><ResponsiveContainer width="100%" height={150}><LineChart data={weightInRange.map(c => ({ date: new Date(c.date).toLocaleDateString('en', { month: 'short', day: 'numeric' }), weight: c.weight }))}><CartesianGrid stroke="#27272a" strokeDasharray="3 3" /><XAxis dataKey="date" stroke="#71717a" fontSize={9} /><YAxis stroke="#71717a" fontSize={9} domain={['dataMin - 1', 'dataMax + 1']} /><Tooltip contentStyle={{ background: '#18181b', border: '1px solid #3f3f46', borderRadius: 8, fontSize: 12 }} /><Line type="monotone" dataKey="weight" stroke="#ec4899" strokeWidth={2} dot={{ fill: '#ec4899', r: 3 }} /></LineChart></ResponsiveContainer></div>}
    </div>
  );
}

function SummaryStat({ icon: Icon, label, value, sub, color }) {
  const colorMap = { amber: 'text-amber-400', orange: 'text-orange-400', rose: 'text-rose-400', red: 'text-red-400' };
  return <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-3"><div className="flex items-center justify-between"><p className="text-[10px] font-mono text-zinc-500 tracking-wider">{label}</p><Icon size={12} className={colorMap[color]} /></div><p className="font-display text-3xl text-zinc-100 mt-1 leading-none">{value}</p><p className="text-[10px] font-mono text-zinc-500 mt-0.5">{sub}</p></div>;
}

function ExerciseDeepDive({ userLogs, rangedLogs }) {
  const allExercises = [...new Set(userLogs.flatMap(l => l.exercises.map(e => e.name)))].sort();
  const [selected, setSelected] = useState(allExercises[0] || '');
  if (allExercises.length === 0) return <p className="text-zinc-500 text-sm text-center pt-8">No exercises logged yet.</p>;
  const exLogs = rangedLogs.filter(l => l.exercises.find(e => e.name === selected));
  const stats = exLogs.map(log => { const ex = log.exercises.find(e => e.name === selected); const maxWeight = Math.max(...ex.sets.map(s => s.weight)); const topSet = ex.sets.find(s => s.weight === maxWeight); const volume = ex.sets.reduce((s, set) => s + set.weight * set.reps, 0); return { date: new Date(log.date).toLocaleDateString('en', { month: 'short', day: 'numeric' }), weight: maxWeight, reps: topSet?.reps || 0, volume, est1RM: Math.round(calc1RM(maxWeight, topSet?.reps || 1)) }; });
  const allLogsForEx = userLogs.filter(l => l.exercises.find(e => e.name === selected));
  const allSets = allLogsForEx.flatMap(l => l.exercises.find(e => e.name === selected).sets);
  const allTimeMaxWeight = allSets.length ? Math.max(...allSets.map(s => s.weight)) : 0;
  const allTimeBest1RM = allSets.length ? Math.round(Math.max(...allSets.map(s => calc1RM(s.weight, s.reps)))) : 0;
  return (
    <div className="space-y-4">
      <select value={selected} onChange={e => setSelected(e.target.value)} className="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-zinc-100 focus:border-amber-500 outline-none">{allExercises.map(ex => <option key={ex} value={ex}>{ex}</option>)}</select>
      <div className="grid grid-cols-3 gap-2"><SummaryStat icon={Award} label="ALL-TIME PR" value={`${allTimeMaxWeight}kg`} sub="best lift" color="amber" /><SummaryStat icon={TrendingUp} label="EST 1RM" value={`${allTimeBest1RM}kg`} sub="est. max" color="orange" /><SummaryStat icon={Calendar} label="LOGGED" value={allLogsForEx.length} sub="times" color="rose" /></div>
      {stats.length >= 2 ? <>
        <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4"><p className="font-mono text-[10px] text-zinc-500 tracking-wider mb-3">TOP WEIGHT (KG)</p><ResponsiveContainer width="100%" height={180}><LineChart data={stats}><CartesianGrid stroke="#27272a" strokeDasharray="3 3" /><XAxis dataKey="date" stroke="#71717a" fontSize={9} /><YAxis stroke="#71717a" fontSize={9} /><Tooltip contentStyle={{ background: '#18181b', border: '1px solid #3f3f46', borderRadius: 8, fontSize: 12 }} /><Line type="monotone" dataKey="weight" stroke="#f59e0b" strokeWidth={2} dot={{ fill: '#f59e0b', r: 4 }} activeDot={{ r: 6 }} /></LineChart></ResponsiveContainer></div>
        <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4"><p className="font-mono text-[10px] text-zinc-500 tracking-wider mb-3">EST 1RM TREND</p><ResponsiveContainer width="100%" height={150}><LineChart data={stats}><CartesianGrid stroke="#27272a" strokeDasharray="3 3" /><XAxis dataKey="date" stroke="#71717a" fontSize={9} /><YAxis stroke="#71717a" fontSize={9} /><Tooltip contentStyle={{ background: '#18181b', border: '1px solid #3f3f46', borderRadius: 8, fontSize: 12 }} /><Line type="monotone" dataKey="est1RM" stroke="#ef4444" strokeWidth={2} dot={{ fill: '#ef4444', r: 3 }} /></LineChart></ResponsiveContainer></div>
        <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4"><p className="font-mono text-[10px] text-zinc-500 tracking-wider mb-3">SESSION VOLUME</p><ResponsiveContainer width="100%" height={150}><BarChart data={stats}><CartesianGrid stroke="#27272a" strokeDasharray="3 3" vertical={false} /><XAxis dataKey="date" stroke="#71717a" fontSize={9} /><YAxis stroke="#71717a" fontSize={9} /><Tooltip contentStyle={{ background: '#18181b', border: '1px solid #3f3f46', borderRadius: 8, fontSize: 12 }} /><Bar dataKey="volume" fill="#a855f7" radius={[4,4,0,0]} /></BarChart></ResponsiveContainer></div>
      </> : <p className="text-zinc-500 text-sm text-center pt-4">Log this exercise at least twice to see trends.</p>}
    </div>
  );
}

function CheckinsTab({ user, checkins, saveCheckins, photos, savePhotos, goals, saveGoals, triggerCelebration }) {
  const [adding, setAdding] = useState(false);
  const [view, setView] = useState('weight');
  const userCheckins = checkins.filter(c => c.user === user).sort((a, b) => new Date(a.date) - new Date(b.date));

    <div className="space-y-4 pt-2">
      <div><p className="font-mono text-[10px] text-zinc-500 tracking-[0.3em]">// CHECK-IN</p><h1 className="font-display text-4xl text-zinc-100">YOUR BODY</h1></div>

        <button onClick={() => setView('weight')} className={`flex-1 py-2 text-[11px] font-mono rounded-full transition flex items-center justify-center gap-1 ${view === 'weight' ? 'bg-amber-500 text-zinc-950' : 'text-zinc-400'}`}><Scale size={12} /> WEIGHT</button>
        <button onClick={() => setView('measure')} className={`flex-1 py-2 text-[11px] font-mono rounded-full transition flex items-center justify-center gap-1 ${view === 'measure' ? 'bg-amber-500 text-zinc-950' : 'text-zinc-400'}`}><Target size={12} /> MEASURE</button>
        <button onClick={() => setView('photos')} className={`flex-1 py-2 text-[11px] font-mono rounded-full transition flex items-center justify-center gap-1 ${view === 'photos' ? 'bg-amber-500 text-zinc-950' : 'text-zinc-400'}`}><ImageIcon size={12} /> PHOTOS</button>
      </div>
      {view === 'weight' && <WeightView userCheckins={userCheckins} checkins={checkins} saveCheckins={saveCheckins} onAdd={() => setAdding(true)} />}
      {view === 'measure' && <MeasurementsView userCheckins={userCheckins} onAdd={() => setAdding(true)} />}
      {view === 'photos' && <PhotosView user={user} photos={userPhotos} allPhotos={photos} savePhotos={savePhotos} />}
      {adding && <CheckinModal user={user} onSave={async (entry) => { await saveCheckins([...checkins, entry]); const wg = detectWeightGoal(entry, checkins, goals || {}); if (wg) triggerCelebration(wg); setAdding(false); }} onClose={() => setAdding(false)} />}
    </div>
  );
}
